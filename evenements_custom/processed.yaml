        interne, choisit de ''geler'' la reconnaissance juridique plutôt que d''écraser
        la sécession. Chicago-Lacustre s''autoproclame capitale d''une Confédération
        regroupant 8 États et 40 nations autochtones, mais le contexte fortress_world
        transforme immédiatement cette rupture en guerre de ressources froide : les
        blocs étrangers, notamment le Bloc Pacifique Nord, reconnaissent silencieusement
        le Compact comme interlocuteur pour les échanges hydriques. L''acte de sécession
        n''est pas une libération — c''est une forteresse qui se ferme à l''intérieur
        d''une autre forteresse.'
      description_complete: 'Octobre 2051, Chicago-Lacustre : sous la coupole de verre
        de l''ancien Navy Pier transformé en chambre délibérative du Compact, les
        délégués des 8 États et 40 nations autochtones signent la Charte des Eaux
        Souveraines au son d''un silence médiatique presque total — les consortiums
        d''État souverains ont coupé les flux vers l''extérieur. La première rupture
        territoriale majeure sur sol américain depuis 1865 est annoncée par une vidéo
        chiffrée diffusée sur les relais du réseau clandestin. Washington répond par
        un blocus administratif et financier, gèle les transferts fédéraux et déploie
        les agences de sécurité intérieure aux points de passage terrestres. Dans
        les rues de Chicago-Lacustre, les habitants regardent les drones de surveillance
        changer d''écusson — fédéral contre lacustre — sans certitude sur lequel représente
        encore une protection.'
      consequences: 'La Confédération lacustre devient une forteresse hydrique disputée
        : ses 21 % de l''eau douce de surface mondiale en font immédiatement une cible
        de pression du Bloc Pacifique Nord et des cartels énergétiques cherchant à
