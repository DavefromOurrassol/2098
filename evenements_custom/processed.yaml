        de Genève tentent d''enregistrer les actes, mais trois blocs refusent de reconnaître
        leur légitimité.'
      description_complete: 'Nuuk, automne 2041 : le Fonds des Glaces Libérées ouvre
        les enchères sur 23 gisements de terres rares mis à nu par la fonte accélérée
        de l''inlandsis. Ce qui devait être un acte souverain historique vire au chaos.
        La Coalition Pacifique Nord, la Ligue Eurasiatique et la Hanse Baltique Recomposée
        se livrent une surenchère fractale — des offres en monnaies-blocs incompatibles,
        des clauses d''exclusivité militarisées, des contre-offres de Bohai Transit
        et de milices contractuelles qui n''ont jamais été invitées. En 72 heures,
        trois contrats contradictoires sont signés sur les mêmes gisements. Le Groenland
        est simultanément le plus riche et le plus dangereux point du globe.'
      consequences: 'Les droits d''extraction restent juridiquement illisibles pendant
        des années, chaque bloc imposant sa lecture par la force sur le terrain, générant
        des affrontements proxy permanents dans l''Arctique déglacé. Le Kalaallit
        Nunaat Sovereign Fund survit comme acteur mais perd toute capacité de régulation,
        devenant otage des puissances qui financent sa sécurité. L''Arctique se transforme
