  - scenario: policy_reform
    status: injected
    instance_data:
      nom: Protocole d'Urgence Amazonienne — Crise de Gouvernance du Bassin Vert
      date: 2047
      date_label: automne 2047
      evenement_cle: état d'urgence écologique amazonien contesté par milices corporatives
        2047
      realisation: Le Consortium Amazônia Viva, reconnu depuis 2041 comme délégation
        auprès du Conseil de Régulation Climatique Global, déclenche formellement
        un état d'urgence écologique sur 40% du bassin amazonien après que les réseaux
        de capteurs IA-climatiques détectent une déforestation illégale massive coordonnée
        par des opérateurs liés aux blocs énergétiques privés. Dans ce monde de gouvernance
        technocratique à tension 4/5, les institutions existent mais leur capacité
        coercitive reste limitée face aux acteurs privés puissants. L'ONU, engluée
        dans ses procédures de coordination multi-niveaux, mandate le Conseil de Régulation
        Climatique Global pour une médiation d'urgence, mais les milices corporatives
        ont déjà sécurisé plusieurs corridors d'extraction avant que le mécanisme
        ne s'active. Belém devient le théâtre d'une confrontation directe entre gardiens
        autochtones soutenus par l'Autorité Mondiale du Vivant et des opérateurs privés
        bénéficiant de couvertures légales dans les zones grises réglementaires.
      description_complete: 'Depuis la tour de crise de Belém, les écrans du Consortium
        Amazônia Viva affichent en temps réel l''avancée des fronts de déforestation
        — des cicatrices rouges sur fond vert que les algorithmes du RIREC calculent
        à 2,3 millions d''hectares en soixante-douze heures. Les milices corporatives,
        outillées de drones d''extraction et de blindés légers, repoussent les patrouilles
        autochtones vers les lisières protégées, tandis que Belém se couvre de fumée
        et de barricades improvisées. À Genève, le Conseil de Régulation Climatique
        Global convoque une session d''urgence : les délégués débattent de résolutions
        pendant que les tronçonneuses tournent. C''est la première fois qu''une entité
        infranationale — le Bassin Amazonien — invoque son statut géopolitique autonome
        pour exiger une intervention directe, court-circuitant les États membres.'
      consequences: La crise force l'adoption précipitée du Protocole de Souveraineté
        Écosystémique de Belém (2048), qui reconnaît pour la première fois des droits
        d'intervention directe à des consortiums autochtones-institutionnels sur des
        territoires en état d'urgence écologique, créant un précédent juridique majeur
        mais fragilisant la légitimité des États-nations riverains. Les blocs énergétiques
        privés, sous pression du CRRC-ARN et des fonds de stabilisation, acceptent
        un régime de supervision algorithmique de leurs opérations extractives en
        Amazonie — une victoire partielle qui n'efface pas les 2,3 millions d'hectares
        perdus. La gouvernance amazonienne devient un laboratoire mondial conflictuel
        pour la question de la souveraineté écosystémique comme acteur géopolitique
        de plein droit.
