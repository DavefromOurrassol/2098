        sans disposer des masses financières des opérateurs extractivistes. Les 72
        heures d''enchères se transforment en crise de légitimité : plusieurs assemblées
        bioterritoriales régionales refusent de reconnaître la légalité de la vente,
        tandis que les Gardiens du Territoire publient un manifeste commun avec des
        communautés inuit dissidentes contestant le droit du Fonds à aliéner des ressources
        souterraines au nom de populations vivantes.'
      description_complete: 'Nuuk, octobre 2041 — Les écrans de la Trame Mnemos s''emballent
        pendant soixante-douze heures : le Fonds des Terres Émergées du Kalaallit
        Nunaat vient d''ouvrir la première enchère internationale sur les gisements
        de terres rares mis à nu par le recul de l''inlandsis. Mais ce qui devait
        être un triomphe de la souveraineté groenlandaise vire rapidement à la cacophonie
        : les Consortiums Logistiques Néo-Industriels des Terres Reconstruites surenchérissent
        contre des coalitions improbables de communs arctiques, pendant que Le Fil
        Commun diffuse en direct les protestations des assemblées de bassin versant
        fennoscandien qui dénoncent une ''privatisation de l''irréparable''. Le centre
        de gravité diplomatique est bien là — mais la gravité attire des forces que
        personne ne contrôle plus.'
      consequences: 'La vente partielle se conclut dans l''ambiguïté : deux lots sont
        attribués à des consortiums néo-industriels résiduels, un troisième reste
        suspendu à une procédure d''arbitrage initiée par la Confédération des Communs
        de l''Arc Septentrional. L''événement accélère la cristallisation d''un mouvement
        de ''démétallisation'' des économies locales — plusieurs assemblées coopératives
        régionales adoptent des chartes d''économie circulaire des matériaux critiques
        pour réduire leur dépendance aux extractions nouvelles. La légitimité du Fonds
