      date: 2059
      date_label: février 2059
      evenement_cle: NAT saisit convoi arctique, Groenland saisit tribunal 2059
      realisation: En février 2059, des unités armées de la Nordisk Arktisk Transitkontroll
        interceptent et immobilisent trois navires de l'Arctic Passage Authority dans
        les eaux du passage Nord-Ouest, revendiquées simultanément par plusieurs blocs.
        L'APA, opérateur para-étatique aligné sur la Coalition Arctique des Blocs
        Continentaux, transportait des cargaisons de terres rares issues des gisements
        ouverts par Nuna Capital en 2041. La NAT justifie l'interception par une violation
        présumée des protocoles de transit souverain instaurés après les décrets de
        2049. Nuna Capital dépose immédiatement une plainte devant le tribunal international
        de la mer — instance résiduelle dont la légitimité est contestée par les grands
        blocs.
      description_complete: Les images des trois navires encerclés dans la banquise
        par les drones de la NAT circulent sur Fractures avant d'être censurées par
        les médias des blocs. C'est la première confrontation armée directe entre
        deux autorités de transit arctiques depuis la militarisation des routes polaires.
        À Nuuk, le Fonds Souverain Nuna Capital convoque une conférence d'urgence
        et annonce le dépôt d'une requête devant le Tribunal International de la Mer
        — une institution que ni le Bloc Atlantique ni le Bloc Eurasiatique Occidental
        ne reconnaissent plus formellement. Les milices de piraterie logistique arctique
        profitent de la confusion pour intercepter un quatrième navire non escorté.
      consequences: L'incident entérine la fragmentation définitive des routes arctiques
        en corridors souverains incompatibles, chaque bloc déployant ses propres protocoles
        d'escorte armée. La saisine du Tribunal International de la Mer, ignorée par
        les grandes puissances, démontre l'impuissance des institutions multilatérales
        résiduelles face aux rapports de force entre blocs. À terme, Nuna Capital
        se trouve contraint de négocier des accords de protection militaire bilatéraux
        avec chacun des blocs pour sécuriser ses exportations, renforçant la logique
        forteresse au détriment de toute gouvernance partagée de l'Arctique.
