  - scenario: breakdown
    status: injected
    instance_data:
      nom: L'Exode des Grands Brûlés — La Déroute du Bureau des Résidus
      date: 2044
      date_label: été 2044
      evenement_cle: 18 millions de déplacés déferlent sur les Grands Lacs, 2044
      realisation: 'Après trois étés consécutifs où les températures du Midwest désertifié
        ont dépassé 55°C, 18 millions d''Américains abandonnent leurs territoires
        en moins de 18 mois. Le Bureau des Territoires Résiduels — déjà fantôme administratif
        incapable de cartographier les zones abandonnées — s''effondre sous la pression
        logistique. Les migrations ne sont pas organisées : elles sont des ruées,
        des chaos de routes saturées, de convois armés, de familles séparées aux checkpoints
        que commencent à ériger les cités-états lacustres refusant l''afflux. L''État
        fédéral, lui-même fragmenté, ne parvient à coordonner aucune réponse cohérente
        ; les quelques directives émises sont ignorées ou contredites par les gouvernements
        régionaux résiduels.'
      description_complete: 'L''été 2044 marque la fin du Midwest habitable. Des colonnes
        humaines s''étirent sur des centaines de kilomètres vers Chicago, Detroit,
        Cleveland — des villes qui n''ont elles-mêmes plus les ressources pour les
        accueillir. Les Grands Lacs deviennent une zone de friction explosive : les
        Communes Libres du Rust Belt barricadent leurs périmètres, les milices agro-défensives
        locales ouvrent le feu sur des convois, et les cartels logistiques régionaux
        spéculent sur l''eau potable et les places dans les entrepôts climatisés.
        Le Bureau des Territoires Résiduels publie un dernier rapport de 340 pages
        que personne ne lit, puis cesse d''émettre.'
      consequences: 'Les zones lacustres deviennent des territoires de friction permanente
        entre populations déplacées, milices locales et factions para-étatiques, accélérant
        la sécession de fait des cités-états du Nord industriel. Le Midwest est officiellement
        classifié zone non récupérable dans les registres résiduels, mais aucune institution
        n''a l''autorité pour faire appliquer quoi que ce soit. Cette migration fonde
        un précédent : la notion même de citoyenneté américaine se dissout au profit
        de l''allégeance territoriale locale, et les flux migratoires deviennent structurellement
        non intégrables pour une génération.'
