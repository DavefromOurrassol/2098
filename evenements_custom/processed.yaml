  - scenario: eco_communalism
    status: injected
    instance_data:
      nom: Écho du Golfe en Feu — Les Bassins sans Pétrole
      date: 2027
      date_label: automne 2027
      evenement_cle: frappes israélo-iraniennes isolent les bassins vivants 2027
      realisation: 'En 2026-2027, le conflit direct entre Israël et l''Iran éclate
        effectivement, mais dans un monde déjà fragmenté en unités locales autonomes,
        il se déroule comme un incendie lointain dont la fumée arrive par vagues.
        Les bioterritoires ne sont pas des belligérants, mais ils subissent les contrecoups
        : perturbation des dernières routes maritimes d''hydrocarbures, effondrement
        ponctuel des flux de carburant vers les territoires encore dépendants, et
        afflux de réfugiés depuis les zones de conflit. Les assemblées bioterritoriales
        n''ont ni ambassadeurs ni armées — elles reçoivent l''onde de choc sans pouvoir
        peser sur son origine. La Trame Mnemos documente en temps réel l''isolement
        croissant de certains nœuds territoriaux.'
      description_complete: 'Automne 2027. Les frappes israéliennes sur les infrastructures
        pétrolières et nucléaires iraniennes, et les ripostes de Téhéran sur les ports
        du Golfe, provoquent ce que les Veilleurs du Seuil nomment ''la seconde coupure''
        : après l''effondrement des chaînes globales, c''est la dernière veine énergétique
        fossile qui se rompt pour des mois. Dans les bioterritoires du pourtour méditerranéen
        et du Proche-Orient, les Gardiens du Territoire convoquent des assemblées
        d''urgence pour gérer les ruptures d''approvisionnement et l''arrivée de flux
        migratoires inédits. Le Fil Commun publie des dispatches fragmentaires depuis
        des correspondants nomades traversant des zones de guerre que plus aucune
        puissance étatique stable ne contrôle vraiment.'
      consequences: 'Le choc accélère paradoxalement la transition bioterritoriale
        : les unités locales encore dépendantes des hydrocarbures du Golfe sont contraintes
        d''accélérer leur bascule vers les communs énergétiques locaux, renforçant
        à long terme la résilience du réseau. Mais à court terme, plusieurs bioterritoires
        fragilisés connaissent des tensions internes sévères, et la vague de réfugiés
        du Proche-Orient recompose durablement la démographie de territoires méditerranéens
        et anatoliens.'
      acteurs:
      - collectifs_du_seuil_eco_communalism
      - coalition_vivant_eco_communalism
      - reseau_mnemos_eco_communalism
      - voix_du_dehors_eco_communalism
      - federation_communs_territoriaux_eco_communalism
