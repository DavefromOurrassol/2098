      nom: Les Éclats d'Agadez — Ce qui reste du Forum
      date: 2061
      date_label: automne 2061
      evenement_cle: Forum d'Agadez fracturé, Charte disputée par les éclats, 2061
      realisation: Ce qui devait être le premier Forum Mondial des Infrastructures
        Hors-Grille se tient bien à Agadez en automne 2061, mais dans un contexte
        radicalement dégradé. La Ligue des Cités du Sahel Numérique n'est plus qu'une
        constellation d'îlots déconnectés — certains fragments refusent de reconnaître
        la légitimité des autres pour parler en leur nom. Sur les 200 délégations
        annoncées, 61 seulement parviennent physiquement à Agadez, les autres étant
        bloquées par des corridors logistiques fracturés, des milices de transit ou
        des épidémies régionales. La Charte d'Agadez sur la souveraineté numérique
        des périphéries est adoptée dans une salle à moitié vide, par des représentants
        dont la légitimité territoriale est contestée dès le lendemain. Trois versions
        concurrentes de la Charte circulent simultanément sur les réseaux mesh, chacune
        revendiquée par un fragment différent.
      description_complete: Agadez, novembre 2061. Dans la grande salle du Palais
        des Conférences à demi-ruiné, 61 délégués signent ce qu'ils appellent la Charte
        d'Agadez — mais dehors, trois autres groupes tiennent des assemblées parallèles
        et rejettent le texte comme illégitime. La Diaspora Tech Sahel, connectée
        via des relais mesh instables depuis Dakar et Lagos, transmet en direct des
        contre-délibérations. Le Réseau des Courriers Nomades Sahélo-Méditerranéens,
        seul à avoir acheminé la moitié des délégués, exige en échange un droit de
        regard sur la gouvernance des nœuds. Ce qui aurait pu être un moment fondateur
        ressemble davantage à la mise en scène d'une unité qui n'existe plus.
      consequences: 'La Charte d''Agadez devient un artefact politique disputé : chaque
        fragment du Sahel numérique en revendique l''interprétation légitime, transformant
        un document de coopération en vecteur de fragmentation supplémentaire. À long
        terme, l''événement accélère la balkanisation des infrastructures hors-grille
        sahéliennes — chaque nœud développe ses propres protocoles incompatibles —
        tout en offrant paradoxalement un référentiel symbolique que certains collectifs
        utilisent comme point de ralliement minimum pour négocier des accords locaux
        ponctuels.'
