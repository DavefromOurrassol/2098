  - scenario: eco_communalism
    status: injected
    instance_data:
      nom: L'Assemblée du Fleuve — Souveraineté ou Fracture
      date: 2047
      date_label: saison sèche 2047, août-septembre
      evenement_cle: Pacte Amazônia Viva déclare souveraineté écologique d'urgence
        2047
      realisation: Dans un monde déjà fragmenté en communs bioterritoriaux, le Pacte
        Amazônia Viva n'est plus un consortium institutionnel mais une confédération
        souple de bassins versants amazoniens. Face à la détection par les Collectifs
        de Géo-Observateurs Citoyens de déforestations massives orchestrées par des
        Enclaves Extractivistes Résiduelles liées à des opérateurs énergétiques hors-communs,
        le Pacte convoque en urgence une grande assemblée à Belém. L'ONU résiduelle,
        dépourvue de moyens d'intervention dans un monde déshiérarchisé, envoie un
        message de soutien symbolique sans effet. La confrontation oppose les Gardiens
        du Territoire — mobilisés spirituellement et physiquement — aux milices de
        protection des corridors d'extraction privés. L'événement force le Réseau
        des Assemblées Bioterritoriales à émettre sa première 'déclaration de souveraineté
        écologique d'urgence' collective, test sans précédent de la capacité des communs
        à défendre leur territoire sans État central.
      description_complete: 'Août 2047, Belém. Les tambours des communautés du Xingu
        résonnent dans les ruelles inondées de la vieille ville portuaire tandis que
        des colonnes de fumée s''élèvent à l''horizon — non pas de feux de brûlis
        rituels, mais d''abattages mécanisés clandestins. Le Pacte Amazônia Viva,
        réuni en session extraordinaire dans les jardins flottants du quartier communal
        de Ver-o-Peso, proclame l''état d''urgence écologique sur 40 % du bassin.
        À l''extérieur, des milices corporatives lourdement équipées font face aux
        Brigades de Restauration Écologique et aux Gardiens du Territoire, dont certains
        portent encore les marques rituelles du dernier brûlage sacré. Le Fil Commun
        retransmet en direct la délibération : pour la première fois, un acteur non-étatique
        issu des communs bioterritoriaux tente d''exercer une souveraineté coercitive
        sur un espace continental.'
      consequences: 'L''événement cristallise la tension fondamentale du modèle éco-communaliste
        : les communs peuvent-ils défendre physiquement leurs territoires sans reproduire
        les logiques étatiques ou militaristes qu''ils rejettent ? La déclaration
        d''urgence établit un précédent jurisprudentiel enregistré par les Archives
        Ouvertes des Jurisprudences Communales, mais la fragmentation du réseau —
        certains communs refusant de s''engager militairement — affaiblit la réponse
        collective. Les Enclaves Extractivistes Résiduelles exploitent ces fractures
        pour consolider leurs corridors d''extraction dans les zones grises, tandis
        que la crise accélère la structuration des Assemblées Bioterritoriales Régionales
        amazoniennes comme organe de défense territoriale permanente.'
