  - scenario: policy_reform
    status: injected
    instance_data:
      nom: Protocole de Médiation de La Haye — Crise Israélo-Iranienne
      date: 2027
      date_label: automne 2027
      evenement_cle: frappes croisées contenues par médiation institutionnelle 2027
      realisation: 'En 2026-2027, Israël lance des frappes ciblées sur les sites d''enrichissement
        iraniens, déclenchant des représailles sur les infrastructures pétrolières
        du Golfe. Mais contrairement aux scénarios d''escalade totale, les institutions
        de gouvernance mondiale — appuyées par le Conseil de Régulation des Ressources
        Critiques — activent en urgence un mécanisme de désescalade économique, menaçant
        les deux parties de sanctions sur leurs flux énergétiques régulés. Le conflit
        reste intense mais court : contenu en moins de quatre mois par une pression
        institutionnelle coordonnée sans précédent. Un cessez-le-feu technique est
        signé à La Haye fin 2027, sous supervision de l''ACRA pour le suivi des communications
        de commandement.'
      description_complete: Les colonnes de fumée sur Kharg Island et les sirènes
        de Tel-Aviv s'éteignent presque aussi vite qu'elles s'allument. Pour la première
        fois dans l'histoire des conflits du Moyen-Orient, une architecture institutionnelle
        globale — encore fragile mais fonctionnelle — parvient à transformer un embrasement
        potentiellement régional en crise contenue. Les marchés pétroliers vacillent
        soixante-douze heures, les flux de tankers sont redirigés via des couloirs
        négociés, et les délégations s'envolent pour La Haye sous pression coordonnée
        des blocs technocratiques. La victoire est présentée comme un triomphe de
        la régulation multilatérale — mais le coût humain et les destructions d'infrastructures
        laissent une plaie béante dans la géopolitique de la région.
      consequences: 'Le conflit accélère paradoxalement la consolidation des institutions
        de gouvernance mondiale : leur capacité à stopper une guerre majeure légitime
        leur autorité et renforce les Protocoles de Sécurité Énergétique Régionale
        adoptés en 2029. Toutefois, la disruption temporaire des flux pétroliers du
        Golfe précipite les investissements dans les alternatives énergétiques régulées,
        consolidant le niveau élevé de la variable énergie. La région reste sous surveillance
        institutionnelle renforcée pendant deux décennies, créant un précédent de
        tutelle technocratique sur les conflits armés souverains.'
      acteurs:
