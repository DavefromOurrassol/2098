    instance_data:
      nom: Insurrection des Zones Déficitaires — São Paulo, la Cartographie Rebelle
      date: 2073
      date_label: automne 2073
      evenement_cle: favelas numériques exposent algorithmes du SPAS 2073
      realisation: 'Après une mise à jour du Sistema Paulista de Alocação Soberana
        (SPAS) qui coupe eau et énergie dans 12 zones jugées à ''rendement négatif'',
        les quartiers périphériques de São Paulo s''embrasent. Des collectifs de hacktivistes
        issus des favelas numériques pénètrent les couches cachées du SPAS et publient
        via des réseaux chiffrés les paramètres d''exclusion intégrés au code source
        — révélant que la ''neutralité algorithmique'' dissimule des critères ethno-économiques
        délibérément encodés. Dans un monde-forteresse où chaque bloc sacralise le
        contrôle numérique, la publication de cette contre-cartographie des allocations
        constitue une bombe institutionnelle : elle prouve que les populations périphériques
        sont gérées comme des variables à éliminer, non à gouverner.'
      description_complete: 'São Paulo, novembre 2073 : des écrans fracturés dans
        les ruelles de Vila Brasilândia affichent en boucle les lignes de code qui
        ont coupé l''eau à quatre millions de personnes. Les collectifs de la Periferia
        Digital ont passé dix-huit mois à reconstituer l''architecture secrète du
        SPAS, construisant en miroir une cartographie citoyenne des flux réels — eau,
        énergie, données — opposée aux cartes officielles du bloc. La soulèvement
        déborde rapidement le numérique : les générateurs autonomes détournés alimentent
        les assemblées de rue, tandis que les agences de sécurité intérieure déploient
        des drones de répression sur les accès aux nœuds de diffusion clandestins.
        Le modèle pauliste est déjà copié, dans les heures qui suivent, par des collectifs
        de Kinshasa, Lagos et Karachi.'
      consequences: L'insurrection ne renverse pas le régime algorithmique de São
        Paulo — les agences de sécurité reprennent le contrôle des infrastructures
        en six semaines — mais la contre-cartographie publiée devient un protocole
        de référence pour les mouvements anti-algorithmiques du Sud global, circulant
        via les archives chiffrées de l'Open Internet Coalition. Le Conseil de Calcul
