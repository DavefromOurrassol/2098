- status: injected
  idea:
    id: exode_midwest_desertification_2044
    description: Après trois étés consécutifs de températures dépassant 55°C dans
      le Midwest désertifié, 18 millions d'Américains migrent vers les zones lacustres
      en moins de 18 mois. Le Bureau des Territoires Résiduels est débordé. Les archives
