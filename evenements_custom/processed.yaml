      description_complete: 'Nuuk, 14 octobre 2041. Les serveurs de Nuna Capital encaissent
        en moins d''une heure trois tentatives d''intrusion simultanées signées des
        blocs rivaux — pendant que leurs délégations, réunies dans le nouveau Centre
        de Souveraineté Arctique, s''affrontent à coups de milliards de crédits-blocs.
        En 72 heures, les droits sur les gisements de néodyme, de dysprosium et de
        lithium changent de mains dans une atmosphère de troc armé plutôt que de droit
        international : deux gisements sont finalement attribués au Bloc Atlantique,
        trois au Consortium Eurasiatique, et les quatre restants demeurent sous séquestre
        groenlandais après que le Bloc Pacifique Nord a claqué la porte. Sur les quais
        de Nuuk, des frégates de trois marines différentes mouillent à portée de canon.'
      consequences: 'Le précédent groenlandais fracture définitivement les dernières
        illusions d''une gouvernance commune des ressources arctiques : la CARS (Chambre
        d''Arbitrage des Ressources Souveraines) est contournée et discréditée, confirmant
        que les blocs se substituent au droit international par la puissance brute.
        À moyen terme, les gisements attribués deviennent des enclaves d''extraction
        militarisées, jalonnant l''Arctique de points de friction permanents qui alimentent
        la course aux armements navals des blocs.'
