      note_coherence: Dans un monde déjà fracturé sans arbitre global, ce conflit
        ne déclenche pas une Troisième Guerre Mondiale mais accélère la désintégration
        des derniers mécanismes de régulation énergétique et migratoire, cohérent
        avec les levels extrêmes des variables et la trajectoire de fragmentation
