        un renforcement des mécanismes de surveillance algorithmique des zones tampons
        et une révision profonde des licences accordées aux opérateurs énergétiques
        privés dans les zones protégées. En creux, elle expose la fragilité résiduelle
        du système : même dans un monde de régénération stabilisée, des acteurs extractifs
        peuvent opérer impunément si les angles morts institutionnels ne sont pas
        comblés.'
