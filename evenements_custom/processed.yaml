  - scenario: policy_reform
    status: injected
    instance_data:
      nom: Exode du Midwest Aride — Protocole d'Intégration Lacustre
      date: 2044
      date_label: été-automne 2044
      evenement_cle: 18 millions de migrants internes vers les Grands Lacs 2044
      realisation: 'Après trois étés consécutifs à plus de 55°C dans un Midwest désertifié,
        18 millions d''Américains convergent vers les zones lacustres en moins de
        18 mois. Dans le cadre technocratique du scénario policy_reform, le Bureau
        des Territoires Résiduels est rapidement épaulé par le Compact des Grands
        Lacs (CGLAGHI) et l''Office Intégré des Flux Migratoires, qui déclenchent
        un protocole d''urgence de planification territoriale algorithmique. La réponse
        institutionnelle, bien que débordée dans un premier temps, s''articule autour
        d''un système de répartition coordonnée activé via ARIA-Nexus, permettant
        une gestion différenciée par zones d''accueil. L''événement se réalise pleinement
        mais révèle les limites de la gouvernance technocratique face à l''ampleur
        humaine de la crise : les algorithmes optimisent les flux mais ne capturent
        pas les résistances communautaires et les tensions identitaires locales.'
      description_complete: L'été 2044 entre dans les annales comme celui de la Grande
        Canicule du Midwest. Les thermomètres ne redescendent plus sous les 50°C entre
        juin et septembre sur un arc de territoire qui s'étend de Kansas City à Columbus.
        En dix-huit mois, dix-huit millions de personnes abandonnent leurs terres
        craquelées et rejoignent les rives des Grands Lacs dans un exode qui surpasse
        en ampleur toutes les migrations internes américaines précédentes. Les villes
        lacustres — Milwaukee, Cleveland, Buffalo, Duluth — voient leur population
        doubler, voire tripler, en quelques saisons. Les institutions technocratiques
        répondent par un déploiement massif de protocoles algorithmiques de redistribution,
        mais sur le terrain, la réalité des camps de transit, des pénuries de logements
        et des frictions intercommunautaires échappe aux modèles de projection.
      consequences: 'L''exode du Midwest amorce une recomposition territoriale durable
        de l''Amérique du Nord : les zones lacustres deviennent les nouveaux centres
        démographiques et politiques du continent, forçant une révision profonde des
        cadres de gouvernance territoriale et de la fiscalité fédérale. Le CGLAGHI
        sort renforcé comme modèle de gouvernance infranationale résiliente, mais
        les tensions entre populations autochtones, résidents historiques et nouveaux
        arrivants alimentent un mouvement de résistance aux relocalisations forcées
        qui contestera durablement l''autorité des institutions technocratiques. À
        l''échelle globale, l''événement sert de cas de référence aux débats sur les
        droits des migrants climatiques internes et pousse à une réforme du droit
        international de la mobilité humaine.'
