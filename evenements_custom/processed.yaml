        personne n''a autorité pour faire respecter — ni le Fantôme de Nairobi, ni
        les Protocoles Fantômes, ni aucun État encore capable de projeter de la force
        dans la région. Belém brûle sous les cameras des quelques réseaux mesh encore
        actifs, diffusant des images que les Bouches de l''Abîme transforment en appels
        à l''insurrection sans lendemain.'
