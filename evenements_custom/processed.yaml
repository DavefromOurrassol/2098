  - scenario: breakdown
    status: injected
    instance_data:
      nom: Les Forges du Commun — Proclamation des Zones Libres de l'Algorithme
      date: 2061
      date_label: automne 2061
      evenement_cle: Rust Belt proclame zones libres algorithme, 2061
      realisation: 'Dans un contexte d''effondrement institutionnel avancé, les Communes
        Libres du Rust Belt n''ont plus besoin de défier un appareil sécuritaire centralisé
        : celui-ci s''est largement délité. L''occupation des anciens sites industriels
        de Detroit, Cleveland et Pittsburgh se fait dans un vide de pouvoir partiel,
        face à des milices contractuelles fragmentées et des enclaves corporatives
        désorganisées. La proclamation des zones libres de l''algorithme prend une
        dimension différente — moins un acte de résistance héroïque qu''une sécession
        de fait dans un monde où personne n''a plus vraiment les moyens de répondre.
        Les Communes sécurisent les ruines industrielles non pas par victoire militaire
        mais par persistance et organisation communautaire, tandis que les appareils
        résiduels de l''ancien bloc nord-américain se contentent d''encercler sans
        pouvoir écraser.'
      description_complete: Automne 2061. Dans les carcasses rouillées des aciéries
        de Pittsburgh et des usines automobiles de Detroit, les Communes Libres du
        Rust Belt hissent leurs bannières sans code-barre et proclament les premières
        Zones Libres de l'Algorithme sur le sol de l'ancienne Amérique industrielle.
        Ce n'est pas la révolution triomphante que leurs fondateurs avaient imaginée
        — c'est une proclamation dans le silence d'un État qui n'a plus les moyens
        de répondre. Des milices contractuelles encerclent les périmètres sans donner
        l'assaut, attendant des ordres qui ne viennent pas des capitales fragmentées.
        Les Communes assemblent des collectifs de réparation énergétique, des brigades
        médicales et des archivistes itinérants dans une fédération de survie qui
        ressemble moins à une utopie qu'à une lifeboat collective au milieu du naufrage.
      consequences: Les Zones Libres deviennent un modèle de référence ambigu pour
        les communautés post-industrielles de l'arc nord-américain — ni victoire ni
        défaite, mais un précédent de sécession organisationnelle qui essaime dans
        d'autres territoires abandonnés. À long terme, leur survie dépend de la capacité
        à maintenir des flux énergétiques autonomes et à négocier des corridors d'approvisionnement
        avec les cartels logistiques régionaux, transformant l'idéal anti-algorithme
        en pragmatisme de survie. L'absence de réponse coercitive coordonnée confirme
        et accélère la fragmentation de la gouvernance nord-américaine.
