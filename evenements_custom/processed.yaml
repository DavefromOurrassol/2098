        duree: 15
        polarite: 1
      - variable: demographie_mobilite_humaine
        delta_level: -9
        duree: 12
        polarite: -1
      propagation_via_matrice: true
      impossible_dans_scenario: false
      note_coherence: Dans un monde déjà fragmenté, ce conflit agit comme perturbateur
        externe lointain mais aux effets tangibles — il accélère les dynamiques de
        désengagement fossile sans remettre en cause la logique bioterritoriale, ce
