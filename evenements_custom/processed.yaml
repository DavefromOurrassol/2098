  - scenario: reference
    status: injected
    instance_data:
      nom: L'Exode des Fours — Migration vers les Grands Lacs
      date: 2044
      date_label: été-automne 2044
      evenement_cle: 18 millions fuient le Midwest désertifié vers les Lacs 2044
      realisation: Après trois étés consécutifs frôlant ou dépassant les 55°C dans
        les plaines du Midwest américain, la zone devient physiologiquement inhabitable
        pendant cinq mois par an. Entre juin 2044 et décembre 2045, environ 18 millions
        de personnes convergent vers les rives des Grands Lacs et les corridors urbains
        de Chicago, Detroit et Cleveland. La Direction des Zones Non Prioritaires
        (DZNP), chroniquement sous-financée dans ce système hybride fragmenté, tente
        de coordonner les flux avec les administrations locales des cités-relais périphériques,
        mais les capacités d'absorption sont dépassées en moins de six mois. Le Compact
        des Grands Lacs — encore embryonnaire en 2044, sept ans avant sa proclamation
        de souveraineté — commence à poser les bases de sa légitimité populaire en
        gérant de facto l'accueil là où l'État fédéral faillit.
      description_complete: Le journaliste Raj Mehta, couvrant l'événement depuis
        Toledo en août 2044, décrit des colonnes de véhicules chargés de biens essentiels
        s'étirant sur des dizaines de kilomètres, la chaleur faisant miroiter l'asphalte
        à 70°C. Les camps d'accueil débordent en moins de trois semaines. Les plateformes
        d'optimisation territoriale par IA tentent d'orienter les flux en temps réel,
        mais les algorithmes, calibrés pour des déplacements graduels, s'effondrent
        face à la soudaineté de l'exode. Les coopératives énergétiques décentralisées
        des rives lacustres deviennent des nœuds de survie improvisés, distribuant
        eau dessalinisée et électricité en dehors de tout cadre fédéral.
      consequences: 'L''événement consacre l''effondrement fonctionnel de la gouvernance
        fédérale résiduelle sur la question migratoire interne et légitime durablement
        les structures sub-étatiques comme le futur Compact des Grands Lacs. La recomposition
        territoriale du Midwest — désormais officiellement zone non prioritaire —
        accélère la logique de mosaïque institutionnelle hybride qui caractérise le
        scénario : certains territoires lacustres densifient leur gouvernance locale,
        tandis que les plaines abandonnées deviennent des espaces de gouvernance zéro.
        La pression démographique sur les zones lacustres génère des tensions hydriques
        et foncières qui alimenteront les crises institutionnelles des décennies suivantes.'
