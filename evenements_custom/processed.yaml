    instance_data:
      nom: 'Acte Fondateur de Funafuti : Naissance du Pacifique Sud Resilience Network'
      date: 2039
      date_label: novembre 2039
      evenement_cle: dernier conseil souverain de Tuvalu, souveraineté flottante proclamée
