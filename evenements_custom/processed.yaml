  - scenario: policy_reform
    status: injected
    instance_data:
      nom: Enchères Circumpolaires du Kalaallit — Protocole de Nairobi
      date: 2041
      date_label: automne 2041
      evenement_cle: première vente aux enchères terres rares Groenland 2041
      realisation: En septembre 2041, le Kalaallit Nunaat Sovereign Fund (KNSF-AGRC)
        lance la première vente aux enchères internationale des droits d'extraction
        sur les gisements de terres rares mis à nu par la fonte accélérée de l'inlandsis.
        Contrairement aux scénarios de ruée anarchique, l'événement se déroule dans
        le cadre institutionnel strict du Conseil de Régulation des Ressources Critiques
        (CRRC-ARN), qui impose des quotas d'extraction, des clauses de réhabilitation
        environnementale et un mécanisme de redistribution vers les fonds de transition.
        Les trois grands blocs (Union Technocratique Eurasiatique, Bloc des Nations
        à Économie Carbone-Contrôlée, consortium occidental via l'AIER) s'affrontent
        dans une surenchère d'offres réglementées, chacun cherchant à satisfaire les
        conditions de conformité institutionnelle tout en maximisant son accès stratégique.
        Le KNSF-AGRC, fort de son nouveau statut d'acteur incontournable reconnu par
        le Traité circumpolaire de 2038, arbitre avec une autorité technocratique
        inédite, transformant 72 heures de négociations en un précédent normatif mondial
        pour la gestion des ressources critiques de l'ère post-glaciaire.
      description_complete: 'Nuuk, automne 2041 : pour la première fois dans l''histoire
        de la diplomatie des ressources, un fonds souverain autochtone préside à la
        répartition mondiale de minéraux stratégiques sous l''œil des algorithmes
        de surveillance du CRRC-ARN. Les salles de négociation hybrides — physiques
        à Nuuk, virtuelles dans les capitales des blocs — voient s''affronter des
        délégations portant des offres assorties de certifications climatiques, de
        plans de réhabilitation et de garanties de traçabilité. L''Observatoire Mondial
        des Ressources Critiques diffuse en temps réel les indicateurs d''impact environnemental
        de chaque lot mis aux enchères. Ingrid Larsson, depuis le Consortium de Presse
        Indépendante, documente l''ironie historique : la fonte qui dévaste devient
        la richesse qui régule.'
      consequences: 'L''événement consolide le modèle de gouvernance technocratique
        des ressources critiques : les blocs dissidents perdent leur argument selon
        lequel la régulation multilatérale est inapplicable aux situations de compétition
        aiguë. Le KNSF-AGRC devient un modèle institutionnel pour d''autres territoires
        arctiques et sub-arctiques, tandis que le CRRC-ARN gagne une légitimité opérationnelle
        sans précédent. En revanche, les syndicats d''extraction privée non régulés
        et les souverainistes énergétiques s''unissent dans une coalition de contestation
