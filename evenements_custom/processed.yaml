    status: injected
    instance_data:
      nom: Les Forges du Commun — Proclamation des Zones Libres du Rust Belt
      date: 2061
      date_label: automne 2061
      evenement_cle: Communes du Rust Belt proclament zones libres de l'algorithme,
        2061
      realisation: 'Dans un contexte d''effondrement des structures fédérales américaines
        et de fragmentation des blocs de gouvernance numérique, le Mouvement des Communes
        du Rust Belt occupe simultanément les friches industrielles de Detroit, Cleveland
        et Pittsburgh à l''automne 2061. La proclamation de ''zones libres de l''algorithme''
        résonne dans un monde où les Protocoles Fantômes sont déjà morts depuis dix
        ans. Le Commandement Atlantique, lui-même vestige fracturé d''une autorité
        militaire jadis unifiée, ne parvient à mobiliser que des unités de maintien
        de l''ordre numérique partiellement opérationnelles — certaines unités refusent
        de marcher contre leurs communautés d''origine. Les trois semaines de confrontations
        urbaines débouchent non pas sur une répression victorieuse, mais sur une fragmentation
        accrue : les Communes tiennent leurs zones, mais isolées, sans horizon fédérateur.'
      description_complete: 'Automne 2061 : dans les entrailles rouillées de Detroit,
        les sirènes des usines reconverties sonnent l''occupation. Les Communes Libres
        du Rust Belt dressent leurs bannières sur les toits des anciens temples industriels
        — Pittsburgh, Cleveland, Detroit — et proclament la mort de l''algorithme
        souverain. Mais dans ce monde déjà fracassé, leur cri ne brise pas un ordre
        : il s''engouffre dans un vide. Les colonnes du Commandement Atlantique qui
        défilent vers les barricades ressemblent davantage à des milices contractuelles
        épuisées qu''à la puissance d''État d''autrefois. Trois semaines de guérilla
        urbaine, de coupures d''énergie négociées et de tractations avec des seigneuries
        logistiques armées voisines — personne ne gagne vraiment, personne ne perd
        complètement.'
      consequences: 'Les Zones Libres du Rust Belt survivent comme enclaves autonomes
        post-industrielles, mais leur modèle ne se propage pas : dans un monde de
        fragmentation généralisée, leur victoire partielle devient simplement un territoire
        de plus dans la mosaïque de pouvoirs concurrents. Le Commandement Atlantique,
        humilié et partiellement désavoué par ses propres unités, perd définitivement
        sa prétention à l''autorité sur les corridors industriels du Midwest. Les
        Communes deviennent un point de référence symbolique pour d''autres mouvements
        populistes anti-technocratiques, mais leur isolement logistique les condamne
        à une survie précaire dépendante de négociations permanentes avec les cartels
        logistiques régionaux.'
