  - scenario: fortress_world
    status: injected
    instance_data:
      nom: La Révolte des Communes Libres du Rust Belt — Zones Hors-Algorithme
      date: 2063
      date_label: automne 2063
      evenement_cle: Communes du Rust Belt proclament zones libres 2063
      realisation: Dans un monde où le Bloc Atlantique a sacrifié ses périphéries
        industrielles déclinantes au profit de ses nœuds stratégiques fortifiés, la
        Fédération des Communes Libres du Rust Belt occupe les friches géantes de
        Detroit, Cleveland et Pittsburgh à l'automne 2063. Appuyées sur les syndicats
        industriels résiduels et les collectifs de réappropriation énergétique, elles
        proclament des territoires soustraits aux systèmes de scoring de productivité
        et aux dispositifs de surveillance numérique souveraine. Le Bloc Atlantique,
        via ses agences de sécurité intérieure, répond par un blocus logistique et
        énergétique — refusant toute intervention militaire frontale qui légitimerait
        les communes — tandis que le Bureau des Territoires Résiduels déclare les
        zones concernées 'non-conformes au protocole d'optimisation continentale'.
        La résistance tient plusieurs mois dans un rapport de force asymétrique et
        médiatiquement étouffé.
      description_complete: 'Automne 2063 : des colonnes de travailleurs anciennement
        déclassés, guidés par des ingénieurs dissidents et des organisateurs communautaires,
        investissent les colosses de béton rouillé des anciens centres industriels
        du Middle West américain. Sur les façades éventrées de Detroit, des banderoles
        proclament : ''Ici, l''algorithme ne calcule pas.'' Les Communes Libres coupent
        les connexions aux réseaux de scoring du Bloc Atlantique, réactivent des micro-réseaux
        énergétiques autonomes et instaurent des assemblées de gestion collective.
        Face à elles, les agences de sécurité intérieure déploient des cordons numériques
        et des coupures d''accès aux hydrogénoducs — une guerre d''asphyxie lente,
        invisible, que le Consortium des Médias d''État Souverains s''emploie à effacer
        des écrans.'
      consequences: L'écrasement progressif des communes — par le froid, la pénurie
        énergétique et les arrestations ciblées plutôt que par la force brute — produit
        un effet de martyr souterrain qui irrigue durablement les réseaux dissidents
        du Bloc Atlantique. La 'Ligne de Pittsburgh' devient une référence codée dans
        les communications clandestines inter-zones, alimentant pendant des décennies
        les collectifs du seuil et les cellules universitaires dissidentes. Paradoxalement,
        l'événement renforce la rhétorique sécuritaire des appareils d'État, qui obtiennent
        un durcissement des dispositifs de surveillance et un reclassement des zones
        industrielles périphériques en 'territoires de vigilance algorithmique renforcée'.
