  - scenario: breakdown
    status: injected
    instance_data:
      nom: La Saisie du Détroit — Incident du Passage Nord-Ouest
      date: 2057
      date_label: été arctique 2057
      evenement_cle: Unités nordiques saisissent convoi arctique, 2057
      realisation: 'Dans un contexte où l''Autorité du Passage Arctique n''est plus
        qu''un fantôme institutionnel disputé entre factions, les unités armées de
        la NAT — une coalition paramilitaire héritière des anciens blocs nordiques
        — interceptent physiquement un convoi encore opéré sous pavillon APA dans
        les eaux du Passage Nord-Ouest. L''incident n''est pas une ''première confrontation
        armée'' au sens classique : c''est une saisie de force par des milices qui
        ne reconnaissent plus aucune autorité supérieure. Le Groenland, via le Kalaallit
        Nunaat Sovereign Fund, tente de porter l''affaire devant un tribunal international
        — mais le Tribunal de la Mer ne dispose plus ni du quorum ni de l''autorité
        d''exécution pour trancher. La procédure s''enlise dans le vide institutionnel.'
      description_complete: 'Août 2057, eaux du Passage Nord-Ouest : trois navires
        sous pavillon de l''Autorité du Passage Arctique sont arraisonnés par des
        unités armées du Konsortiet Nordark, agissant au nom d''une ''créance de transit
        non honorée''. Les équipages sont détenus quarante-deux heures. Nuuk dépose
        une plainte devant les Archives Neutres de Genève, seul référentiel légal
        encore reconnu par une partie des belligérants. La cargaison — hydrocarbures
        résiduels et équipements de forage — disparaît dans les entrepôts flottants
        de Nordark. Ce qui fut un différend juridique entre autorités de transit est
        devenu une razzia industrielle revendiquée.'
      consequences: 'L''incident consacre la mort de facto de toute gouvernance partagée
        du Passage Nord-Ouest : chaque opérateur armé peut désormais invoquer une
        ''créance'' pour légitimer une saisie. Le Kalaallit Nunaat Sovereign Fund
        accélère sa militarisation défensive et cherche des alliances avec la Hanse
        Baltique Recomposée. Les corridors arctiques basculent définitivement dans
        la logique des seigneuries logistiques armées, réduisant les flux à ce que
        chaque faction peut défendre par la force.'
