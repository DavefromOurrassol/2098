        sous l''œil des caméras de Prisme Global. En 72 heures, 847 milliards de crédits-carbone
        équivalents s''échangent pour les droits d''extraction sur 23 gisements. Le
        monde retient son souffle : pour la première fois, un territoire indigène
        souverain fixe unilatéralement les règles d''accès aux ressources les plus
        critiques de la transition énergétique. Les collectifs Inuit et Sami manifestent
