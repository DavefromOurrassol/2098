  - scenario: fortress_world
    status: injected
    instance_data:
      nom: L'Exode des Plaines — Ruée vers les Lacs
      date: 2044
      date_label: été 2044
      evenement_cle: 18 millions de déplacés convergent vers les Grands Lacs 2044
      realisation: Après trois étés consécutifs où les températures dépassent 55°C
        dans le Midwest desséché, 18 millions d'Américains abandonnent leurs foyers
        et convergent vers les zones lacustres en moins de dix-huit mois. Le Bureau
        des Territoires Résiduels, créé précisément pour gérer l'inhabitable, est
        submergé au point de perdre tout contrôle opérationnel sur les couloirs de
        migration. Les agences de sécurité intérieure déploient des cordons de filtrage
        aux abords des grandes métropoles lacustres, transformant l'exode climatique
        en crise de gouvernance sécuritaire. Les blocs émergents observent la désintégration
        de la cohésion territoriale américaine comme un signal préfigurant leurs propres
        logiques de fermeture.
      description_complete: 'Les autoroutes I-90 et I-94 sont des rivières humaines
        : des colonnes ininterrompues de véhicules surchargés, de familles à pied,
        de convois improvisés qui remontent vers Chicago, Detroit, Cleveland, Buffalo.
        Les thermomètres de Kansas City ont affiché 57°C pendant dix-neuf jours consécutifs
        en juillet 2044 — les puits sont à sec, les récoltes ont brûlé avant maturité
        pour la troisième année de suite. Le Bureau des Territoires Résiduels émet
        des ''avis de réorientation volontaire'' que plus personne ne lit : les gens
        sont déjà partis. Aux checkpoints lacustres, des files de plusieurs kilomètres
        stagnent sous une chaleur toujours meurtrière, pendant que les officiers de
        sécurité trient, tamponnent, refusent.'
      consequences: L'exode fracture définitivement la fiction d'un territoire américain
        unifié et administrable, précipitant la cristallisation de la région des Grands
        Lacs en entité quasi-souveraine qui culminera avec le Compact de 2051. La
        surcharge démographique des zones lacustres génère une compétition violente
        pour l'eau et les logements, alimentant les milices locales et les futures
        Communes du Rust Belt. Pour les blocs en cours de constitution, l'effondrement
        de la gestion territoriale américaine devient le paradigme justifiant leurs
        propres politiques de tri et de fermeture.
