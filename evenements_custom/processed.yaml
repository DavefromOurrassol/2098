  - scenario: breakdown
    status: injected
    instance_data:
      nom: La Déflagration du Croissant — Embrasement sans arbitre
      date: 2027
      date_label: automne 2027
      evenement_cle: frappes israéliennes détruisent les puits iraniens 2027
      realisation: En septembre 2027, Israël lance une série de frappes massives sur
        les installations nucléaires d'Ispahan et de Fordow, ainsi que sur les terminaux
        pétroliers de Kharg. L'Iran riposte par des salves de missiles balistiques
        sur Haïfa et les champs gaziers offshore. Sans OTAN cohérente et avec une
        diplomatie américaine paralysée par la crise intérieure, aucune puissance
        ne peut ni ne veut jouer le rôle d'arbitre. L'Arabie saoudite ferme le détroit
        d'Ormuz à titre 'préventif', précipitant une panique énergétique mondiale.
        Le conflit ne se résout pas — il se cristallise en état de guerre permanente
        de basse à moyenne intensité, redessinant les flux d'hydrocarbures pour les
        décennies suivantes.
      description_complete: 'Automne 2027 : les caméras de surveillance satellitaire
        captent les champignons de fumée noire s''élevant des cuves de Kharg avant
        même que les chancelleries n''aient eu le temps de se réunir. Il n''y a plus
        de Conseil de sécurité fonctionnel pour voter un cessez-le-feu, plus d''hotline
        Washington-Téhéran qui tienne. Les marchés pétroliers — déjà sous tension
        depuis la fragmentation des accords OPEP+ — s''effondrent en quelques heures
        dans un sens, puis explosent à la hausse dans l''autre. Sur les réseaux mesh
        qui survivent à la coupure, Le Signal diffuse des images de colonnes de réfugiés
        quittant Bassorah : c''est le début d''un exode qui ne s''arrêtera pas.'
      consequences: La destruction partielle des infrastructures pétrolières du Golfe
        accélère l'effondrement des systèmes d'approvisionnement énergétique mondiaux
        déjà à genoux, rendant caducs les derniers mécanismes de régulation internationale
        des ressources. Les flux migratoires du Moyen-Orient et du Golfe se déversent
        en vagues incontrôlées vers l'arc eurasien, saturant des corridors déjà sous
        la coupe de seigneurs de guerre logistiques. La zone Golfe Persique–Levant
        devient une zone grise permanente où aucun acteur souverain n'exerce de contrôle
        stable, servant de modèle fractal à d'autres régions en voie de désintégration.
      acteurs:
