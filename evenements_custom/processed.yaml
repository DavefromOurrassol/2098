  - scenario: fortress_world
    status: injected
    instance_data:
      nom: 'Embrasement du Corridor Pétrolier : la Guerre des Forteresses du Moyen-Orient'
      date: 2027
      date_label: été 2027
      evenement_cle: frappes israéliennes sur les sites pétroliers iraniens 2027
      realisation: 'En 2027, après des années de provocations croisées et d''escalade
        de proxy, Israël lance une série de frappes aériennes massives sur les installations
        nucléaires souterraines d''Isfahan et Natanz, ainsi que sur les terminaux
        pétroliers de Kharg Island. L''Iran riposte par des missiles balistiques sur
        Haïfa et des attaques via ses relais au Yémen, en Irak et au Liban. Les monarchies
        du Golfe, prises en étau entre leur dépendance sécuritaire à l''Occident et
        leurs intérêts commerciaux avec Téhéran, se fractionnent : l''Arabie Saoudite
        ferme son espace aérien, les Émirats activent leurs clauses de neutralité
        d''urgence. En six semaines de conflit ouvert, aucune puissance extérieure
        ne cherche à désescalader — chaque bloc ferme ses frontières énergétiques
        et sécurise ses corridors d''approvisionnement plutôt que de jouer les médiateurs.'
      description_complete: 'Le ciel de Kharg Island s''est embrasé le 14 juillet
        2027 : les drones de combat israéliens, escortés de chasseurs F-35 ravitaillés
        en vol depuis des bases discrètes en Azerbaïdjan, ont frappé les vannes de
        l''île en moins de quarante minutes. Les caméras de surveillance des pétroliers
        captent une mer noire de brut en feu à des kilomètres à la ronde. À Téhéran,
        le Conseil des Gardiens décrète la mobilisation totale et coupe le détroit
        d''Ormuz par un barrage de mines navales. Sur les marchés énergétiques — ce
        qu''il en reste — les prix du brut explosent de 340 % en quarante-huit heures
        avant que les blocs ne suspendent toute cotation internationale. Fractures
        publie ses premières images brutes depuis un correspondant clandestin à Bassora
        : des colonnes de réfugiés irakiens marchant vers la frontière turque, refoulés
        par des drones-gardes-frontières programmés pour tirer.'
      consequences: 'Le conflit accélère la balkanisation énergétique mondiale : chaque
        bloc se replie sur ses propres réserves et accélère les programmes de souveraineté
        pétrolière et gazière, marginalisant définitivement les derniers mécanismes
        d''arbitrage international comme la CARS. La région du Golfe devient une zone-tampon
        disputée, administrée de facto par des accords secrets entre le Pacte des
        Forteresses Souveraines et les seigneurs de guerre logistiques qui contrôlent
        les routes de contournement d''Ormuz. Le flux de réfugiés du Moyen-Orient
        — estimé à 12 millions de personnes en deux ans — se heurte aux murs des blocs
        et alimente une économie grise des passages clandestins dont Vasil Orentchev
        et ses réseaux sont les principaux bénéficiaires.'
      acteurs:
      - alliance_blocs_souverains_fortress_world
      - conseil_regulation_ressources_fortress_world
      - vasil_orentchev_fortress_world
      - voix_du_dehors_fortress_world
      - consortium_helios_fortress_world
      - assemblee_territoires_fortress_world
