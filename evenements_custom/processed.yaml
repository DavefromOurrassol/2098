  - scenario: fortress_world
    status: injected
    instance_data:
      nom: Insurrection des Communes du Rust Belt — Zones Libres de l'Algorithme
      date: 2063
      date_label: automne 2063
      evenement_cle: Rust Belt occupe friches industrielles contre l'algorithme 2063
      realisation: Dans un Bloc Atlantique où le scoring citoyen et la gouvernance
        algorithmique ont marginalisé des millions de travailleurs des anciennes ceintures
        industrielles, la Fédération des Communes Libres du Rust Belt coordonne simultanément
        l'occupation de friches industrielles majeures à Detroit, Cleveland et Pittsburgh.
        Les communes proclament des 'zones libres de l'algorithme' — espaces soustraits
        au scoring de l'Autorité Numérique du Bloc Atlantique. L'exécutif militaro-civil,
        incapable de tolérer ces enclaves hors-contrôle à l'intérieur du bloc, déploie
        les unités de maintien de l'ordre numérique du Commandement Stratégique des
        Matières Critiques Atlantique. Trois semaines de confrontations urbaines s'ensuivent,
        caractérisées par des brouillages de réseaux de surveillance, des batailles
        de rues dans les corridors industriels reconvertis et des tentatives de coupures
        énergétiques ciblées.
      description_complete: 'L''automne 2063 voit les ruines fumantes des usines de
        Detroit et les silos désaffectés de Pittsburgh se transformer en barricades
        symboliques contre l''ordre algorithmique. Des dizaines de milliers de résidents
        des zones déficitaires d''optimisation, exclus des quotas de productivité
        depuis des années, hissent des drapeaux noirs marqués ''Hors Réseau'' sur
        les cheminées d''acier. L''Autorité Numérique du Bloc Atlantique désigne immédiatement
        l''insurrection comme ''nœud de contamination numérique souverain'' et déclenche
        la Directive 7-Fermeture : coupures de flux, déploiement de drones de maintien
        de l''ordre et blackout informationnel total sur les trois zones. La journaliste
        clandestine Vera Solano, infiltrée depuis le début, transmet les seules images
        du conflit à travers les réseaux de passeurs d''information inter-blocs —
        des images qui traverseront les frontières forteresses comme une fissure dans
        le béton.'
      consequences: 'L''insurrection est militairement écrasée au bout de vingt-deux
        jours, mais ses effets de fracture sont durables : les zones repassent sous
        contrôle algorithmique avec un régime de surveillance renforcé, alimentant
        une radicalisation croissante des syndicats industriels résiduels et des collectifs
        de réappropriation énergétique périphérique. Le Bloc Atlantique, contraint
        d''admettre une brèche dans sa cohérence interne, durcit ses dispositifs de
        surveillance numérique souveraine et accélère le déploiement de systèmes de
        scoring préventifs — créant un cercle vicieux d''exclusion et de résistance
        qui préfigure les fractures urbaines de la décennie suivante.'
