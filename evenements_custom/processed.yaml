  - scenario: reference
    status: injected
    instance_data:
      nom: L'Incident du Passage Nord-Ouest — Saisie du Convoi APA
      date: 2059
      date_label: été 2059
      evenement_cle: Convoi arctique saisi, premières armes tirées 2059
      realisation: En août 2059, l'Armada Logistique Nordique intercepte un convoi
        de l'Autorité de Passage Arctique dans les eaux disputées du Passage Nord-Ouest,
        arguant d'une violation des droits de transit accordés par les accords bilatéraux
        ALN-Canada de 2052. Les unités para-étatiques de l'ALN immobilisent trois
        navires-cargo sous escorte armée, blessant deux membres d'équipage. C'est
        la première confrontation armée directe entre les deux autorités concurrentes
        de transit arctiques. Le Groenland, dont le Kalaallit Nunaat Sovereign Fund
        finance partiellement l'APA, porte immédiatement l'affaire devant le Tribunal
        International de la Mer, tandis que le Conseil des États Nordiques Intégrés
        se réunit en session d'urgence.
      description_complete: Les eaux grises du Passage Nord-Ouest, déglaciées depuis
        deux décennies, sont devenues la scène d'une confrontation que beaucoup annonçaient
        inévitable. Des patrouilleurs de l'Armada Logistique Nordique ont ouvert le
        feu de sommation sur le convoi de l'APA le 14 août 2059, avant de procéder
        à un abordage armé — une première depuis la création des deux autorités concurrentes.
        Les images transmises par les collectifs de journalisme embarqué à bord montrent
        des hommes en combinaisons grises sans insigne d'État clair, soulignant l'ambiguïté
        juridique fondamentale de ces forces para-étatiques. À Nuuk, le gouvernement
        groenlandais qualifie l'incident de 'piraterie institutionnalisée' et active
        ses recours juridiques internationaux.
      consequences: L'incident cristallise la fracture de gouvernance arctique en
        forçant les blocs signataires du Pacte Énergétique Multilatéral à prendre
        position sur le statut juridique des opérateurs para-étatiques dans les corridors
        maritimes. À moyen terme, la procédure devant le Tribunal International de
        la Mer pourrait aboutir à un précédent normatif redéfinissant les droits de
        transit arctiques — mais risque également de s'enliser dans une impasse institutionnelle
        si l'ALN refuse sa juridiction, renforçant la logique de milices concurrentes
        des droits de passage dans l'ensemble de la région.
