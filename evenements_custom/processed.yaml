  - scenario: eco_communalism
    status: injected
    instance_data:
      nom: Insurrection des Friches Vivantes — L'Automne des Zones Libres
      date: 2063
      date_label: automne 2063
      evenement_cle: Communes du Rust Belt bannissent gouvernance algorithmique 2063
      realisation: Dans un monde déjà fragmenté en communs autonomes, le Mouvement
        des Communes du Rust Belt — incarné par la Confédération des Friches Vivantes
        — n'est pas une révolte soudaine mais l'aboutissement d'une décennie de reconquête
        patiente des friches industrielles de Detroit, Cleveland et Pittsburgh. En
        octobre 2063, les assemblées locales proclament simultanément des 'zones libres
        de l'algorithme', bannissant les systèmes de surveillance numérique des Enclaves
        Technologiques et les protocoles d'allocation automatisée imposés par les
        Fragments d'États Centraux Résiduels. Le Commandement Atlantique — vestige
        hybride d'une autorité fédérale résiduelle — déploie des unités de maintien
        de l'ordre numérique, mais ses leviers coercitifs numériques sont largement
        neutralisés par la Trame Mnemos locale, qui opère en mode mesh fermé. Trois
        semaines de confrontations physiques et informationnelles s'ensuivent, documentées
        en temps réel par Le Fil Commun.
      description_complete: 'Les cheminées éteintes de Pittsburgh flamboient d''une
        lumière différente en ce mois d''octobre 2063 : des milliers de lanternes
        solaires de fabrication coopérative illuminent les friches reconverties en
        jardins-ateliers, pendant que les haut-parleurs des radios communautaires
        basse consommation diffusent la proclamation des Zones Libres. Les unités
        de maintien de l''ordre numérique du Commandement Atlantique se heurtent à
        une résistance organisée non par des armes mais par des protocoles de déconnexion
        maîtrisés, des coupures de flux de données ciblées et une logistique inter-communautaire
        rodée depuis l''exode du Midwest de 2044. Pendant vingt-deux jours, les friches
        tiennent, transformant les confrontations en démonstration publique de souveraineté
        territoriale vécue.'
      consequences: L'échec relatif de la répression numérique fissure durablement
        la légitimité des Fragments d'États Centraux Résiduels dans la région des
        Grands Lacs, accélérant l'adhésion de plusieurs communes hésitantes aux Assemblées
        Coopératives Régionales. Les Zones Libres du Rust Belt deviennent un modèle
        jurisprudentiel documenté par les Archives Ouvertes des Jurisprudences Communales,
