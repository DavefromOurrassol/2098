    instance_data:
      nom: Le Compact des Grands Lacs — Sécession de fait
      date: 2053
      date_label: été 2053
      evenement_cle: Chicago-Lacustre proclame le Compact souverain des eaux, 2053
      realisation: Dans un contexte de délitement fédéral accéléré et de sécheresses
        catastrophiques frappant le Midwest, le Great Lakes Autonomous Compact ne
        vote pas une sécession proprement dite — les institutions fédérales américaines
        sont trop fragmentées pour qu'un tel vote ait encore un sens formel. C'est
        plutôt une déclaration de juridiction exclusive sur les Grands Lacs qui s'impose
        de facto, Chicago-Lacustre devenant le nœud de coordination d'une confédération
        informelle regroupant huit États résiduels et quarante nations autochtones.
        Washington, incapable de projeter une réponse militaire cohérente et lui-même
        fracturé entre factions gouvernementales concurrentes, enregistre l'événement
        comme une 'dérogation administrative temporaire'. Le Compact contrôle désormais
        le plus grand réservoir d'eau douce de surface au monde, dans un monde qui
        meurt de soif.
      description_complete: 'L''été 2053, Chicago-Lacustre est pavoisée de drapeaux
        bleus à onde blanche. Le Great Lakes Autonomous Compact, né trois ans plus
        tôt d''un accord pragmatique entre gouverneurs résiduels et conseils tribaux
        ojibwés, potawatomis et haudenosaunee, proclame sa juridiction exclusive sur
        les Grands Lacs — non pas comme une déclaration de guerre à Washington, mais
        comme un constat : il n''y a plus personne en face. Les Communes Libres du
        Rust Belt y voient une victoire historique ; les cartels logistiques régionaux
        y voient une opportunité. Pour les 40 nations autochtones signataires, c''est
        la reconnaissance tardive et chaotique d''une souveraineté que nul n''avait
        jamais vraiment leur accorder. Première rupture territoriale formelle sur
        le sol américain depuis 1865 — célébrée ici, ignorée là, combattue ailleurs.'
      consequences: 'Le Compact des Grands Lacs devient immédiatement une cible géopolitique
        de premier ordre : l''eau douce qu''il contrôle est une ressource que les
        factions étatiques résiduelles du Midwest et du Sud-Est américain réclament
        par la force ou la négociation. Les milices d''accaparement hydrique prolifèrent
        aux marges du territoire revendiqué, tandis que les nations autochtones membres
        du Compact tentent de consolider un modèle de gouvernance par les communs
        que nul État voisin ne reconnaît — et que plusieurs cherchent activement à
        démanteler. Le précédent inspire une douzaine d''autres entités régionales
        sur le continent, accélérant la désintégration du cadre fédéral américain
        au-delà de tout seuil de récupération.'
