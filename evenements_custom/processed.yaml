      date: 2073
      date_label: été austral 2073
      evenement_cle: contre-cartographie algorithmique publiée à São Paulo 2073
      realisation: 'En juillet 2073, une mise à jour de la Rede Paulista de Distribuição
        Algorítmica classe 12 zones périphériques comme ''à rendement négatif'' et
        suspend automatiquement eau et énergie. Les favelas numériques, équipées d''outils
        de délibération augmentée issus des réformes de gouvernance participative
        des années 2040, organisent une contre-expertise collective : elles extraient,
        décodent et publient les paramètres cachés du système via des réseaux d''audit
        citoyen. Dans un monde de policy_reform où la transparence institutionnelle
        est un principe affiché mais rarement tenu, la publication des paramètres
        internes de la RPDA constitue une bombe politique. L''événement force le Conseil
        Intergouvernemental de Régulation Technologique à ouvrir une procédure d''urgence,
        et le RAAI est mandaté pour un audit indépendant, donnant au soulèvement une
        résonance institutionnelle inédite.'
      description_complete: Pendant trois semaines, les quartiers périphériques de
        São Paulo tiennent en échec l'un des systèmes d'allocation algorithmique les
        plus sophistiqués d'Amérique du Sud. Les habitants ne brûlent pas des serveurs
        — ils les lisent. La contre-cartographie publiée par les collectifs locaux
        révèle que le critère de 'rendement négatif' masque en réalité une pondération
        raciale et économique inscrite dans les couches profondes de la RPDA. Les
        flux d'information explosent sur les plateformes certifiées et non certifiées
        simultanément, mettant en crise le Conseil de Gouvernance de l'Information
        qui peine à contenir la narration. São Paulo devient en quelques jours le
        symbole mondial d'une gouvernance algorithmique qui redistribue la précarité
        sous couvert d'optimisation.
      consequences: L'événement catalyse une réforme forcée des standards d'auditabilité
        des systèmes d'allocation publics, avec l'adoption en 2076 d'un protocole
        de transparence paramétrique obligatoire pour tout système gérant des ressources
        critiques dans les métropoles membres du CRTI. Il exporte également le modèle
        de contre-cartographie citoyenne au reste du Sud global, fragilisant durablement
        la légitimité des consortiums privés de gouvernance algorithmique et renforçant
        les collectifs d'audit indépendants comme interlocuteurs institutionnels reconnus.
