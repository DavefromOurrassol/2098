      nom: 'La Sécession des Grands Lacs : Le Compact Autonome de 2051'
      date: 2051
      date_label: automne 2051
      evenement_cle: Compact des Grands Lacs proclame sa souveraineté lacustre 2051
      realisation: 'Après une décennie de contentieux hydrique entre les États riverains
        et Washington — exacerbée par les crises d''approvisionnement en eau potable
        de 2043-2048 et le refus répété du gouvernement fédéral de reconnaître la
        juridiction exclusive du Compact sur les Grands Lacs —, les délégués de huit
        États et quarante nations autochtones réunis à Chicago-Lacustre ratifient
        l''Acte de Souveraineté Lacustre. La sécession n''est pas totale : le Compact
        maintient des liens économiques résiduels avec Washington, mais revendique
        une autonomie complète sur la gestion hydrologique, fiscale et sécuritaire
        de la région. Dans le scénario référence, cet acte est rendu possible par
        la fragilisation progressive des institutions fédérales américaines, elles-mêmes
        sous pression des ajustements climatiques et des redistributions économiques
        inachevées.'
      description_complete: Le 14 novembre 2051, sous les verrières de l'ancien Millennium
        Park transformé en salle des délibérations confédérales, les représentants
        du Compact des Grands Lacs signent l'Acte de Souveraineté Lacustre devant
        12 000 témoins. Chicago-Lacustre, dont le niveau du lac Michigan a baissé
        de 1,8 mètre en quarante ans sous l'effet conjugué des sécheresses continentales
        et des pompages industriels non régulés, devient la capitale de facto d'une
        confédération hybride mêlant gouvernements d'États résiduels et nations autochtones.
        Washington dénonce un acte inconstitutionnel mais ne dispose ni de la volonté
        politique ni des moyens opérationnels pour y répondre militairement, piégé
        dans ses propres déficits de légitimité.
      consequences: 'La rupture institutionnalise le modèle confédéral hydro-territorial
        comme réponse crédible à l''échec de la gouvernance fédérale face aux crises
        climatiques, inspirant des mouvements similaires dans le bassin du Colorado
        et les États des Grands Plaines. À l''échelle internationale, elle fragilise
        la position américaine dans les négociations multilatérales sur les ressources
        critiques, ouvrant un vide géopolitique partiellement comblé par le Bloc Ressources
