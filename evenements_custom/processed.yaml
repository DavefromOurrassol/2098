  - scenario: reference
    status: injected
    instance_data:
      nom: 'Crise de Souveraineté Amazonienne : L''Épreuve de Belém'
      date: 2047
      date_label: automne 2047
      evenement_cle: Belém, théâtre d'une confrontation souveraineté-milices corporatives
        2047
      realisation: 'Le Consortium Amazônia Viva, appuyé sur une légitimité hybride
        mêlant gouvernance autochtone et accréditation onusienne fragile, déclare
        l''état d''urgence écologique sur 42% du bassin amazonien après que des capteurs
        citoyens et des ONG de terrain ont documenté des vagues massives de déforestation
        orchestrées par des opérateurs privés liés aux blocs énergétiques du BRE.
        La réponse institutionnelle est laborieuse : le système multilatéral survivant
        parvient à convoquer une session extraordinaire mais échoue à mandater une
        intervention directe, faute de consensus entre blocs signataires du Pacte
        Énergétique. À Belém, les milices corporatives affrontent physiquement les
        gardiens autochtones mobilisés par la Frente Sertão Livre, dans une confrontation
        de trois semaines qui expose la limite réelle du droit international en territoire
        contesté.'
      description_complete: 'Automne 2047. Belém brûle d''une lumière rouge : les
        fumées des zones déforestées illégalement s''accumulent au-dessus de la ville-carrefour
        du bassin amazonien. Le Consortium Amazônia Viva, seul acteur institutionnel
        capable de revendiquer une légitimité sur la forêt, active pour la première
        fois son protocole d''urgence écologique — une déclaration que nul État souverain
        n''est prêt à faire sien, et qu''aucun n''est prêt à invalider non plus. Les
        milices corporatives des opérateurs énergétiques opaques sécurisent les axes
        routiers ; les gardiens autochtones, coordonnés par la Frente Sertão Livre
        et documentés en temps réel par des collectifs de journalistes indépendants
        régionaux, tiennent les accès fluviaux. L''ONU observe, publie, condamne —
        sans bouger.'
      consequences: 'L''épreuve de Belém cristallise le statut ambigu mais irréversible
        du bassin amazonien comme acteur géopolitique autonome non-étatique : le Consortium
        Amazônia Viva sort de la crise avec une autorité morale accrue mais des capacités
        coercitives insuffisantes, contraignant à terme les blocs signataires du Pacte
        Énergétique à négocier des corridors d''exclusion économique. Le précédent
        institutionnel ouvre une décennie de conflits de basse intensité entre consortiums
        énergétiques opaques et gardiens territoriaux, normalisant une forme de guerre
        d''usure écologique qui fragilise durablement la gouvernance continentale
        sud-américaine.'
