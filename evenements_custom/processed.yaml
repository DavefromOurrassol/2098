  - scenario: reference
    status: injected
    instance_data:
      nom: 'Frappes croisées Israël-Iran : l''embrasement contenu'
      date: 2026
      date_label: automne 2026
      evenement_cle: Frappes israéliennes sur Fordo déclenchent contre-frappes iraniennes
        2026
      realisation: 'En octobre 2026, Israël lance une série de frappes de précision
        sur les sites nucléaires iraniens de Fordo et Natanz, ainsi que sur plusieurs
        terminaux pétroliers du Khuzestan. L''Iran riposte par des salves de missiles
        balistiques ciblant des bases militaires israéliennes et des infrastructures
        énergétiques en mer Rouge. Les monarchies du Golfe, prises en étau, appliquent
        une neutralité de façade tout en fermant leurs espaces aériens. La mobilisation
        diplomatique d''urgence — portée notamment par des canaux back-channel via
        la Turquie et le Qatar — évite une escalade terrestre, mais le conflit reste
        suspendu pendant plusieurs semaines dans un état de ''guerre de frappes maîtrisées''.
        L''équilibre fragile du scénario de référence joue ici un rôle amortisseur
        : aucune puissance majeure n''a intérêt à une déflagration totale qui effondrerait
        les marchés énergétiques sur lesquels repose la transition.'
      description_complete: 'Les images de Fordo en flammes font le tour des réseaux
        en quelques minutes : Israël vient de franchir le seuil que la communauté
        internationale repoussait depuis vingt ans. Téhéran répond dès le lendemain,
        ses missiles traçant des arcs lumineux au-dessus du Golfe Persique. Les cours
        du pétrole bondissent de 40 % en quarante-huit heures, les marchés du gaz
        naturel liquéfié s''affolent, et les corridors de transit énergétique vers
        l''Asie se retrouvent sous surveillance militaire active. Raj Mehta, depuis
        Singapour, décrit un monde ''qui retient son souffle en regardant deux États
        jouer à la roulette avec les pipelines dont le reste de la planète dépend''.'
      consequences: 'Le conflit accélère la fragmentation des marchés énergétiques
        mondiaux : le Consortium Helios doit recomposer en urgence ses flux d''approvisionnement
        en contournant le Golfe, renforçant paradoxalement les corridors nordiques
        et accélérant certains investissements dans les énergies renouvelables par
        peur de dépendance. Sur le plan géopolitique, l''événement consolide le Pacte
        des Souverains — qui y voit la démonstration que les institutions multilatérales
        sont incapables de prévenir les conflits régionaux majeurs — et affaiblit
        durablement la crédibilité des mécanismes de non-prolifération, laissant plusieurs
        États du Moyen-Orient accélérer discrètement leurs propres programmes.'
