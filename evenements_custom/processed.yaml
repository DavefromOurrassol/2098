      realisation: 'En novembre 2039, la submersion définitive de l''atoll principal
        de Funafuti, accélérée par une saison cyclonique record, force la tenue d''un
        dernier Conseil des ministres en territoire physique — à bord d''une barge
        ancrée à deux mètres au-dessus de ce qui fut jadis la capitale. Dans ce scénario
        de gouvernance technocratique stabilisée, la communauté internationale réagit
        avec une rapidité sans précédent : le Conseil de Régulation Climatique Global
        active un protocole d''urgence, reconnaissant formellement la souveraineté
        flottante de Tuvalu et de six autres États insulaires co-signataires. Le transfert
        de souveraineté vers une plateforme modulaire financée par le Fonds Mondial
        de Résilience Infrastructurelle est ratifié en séance plénière par 94 États
        membres. Le Pacific South Resilience Network est constitué comme entité de
        droit international post-territorial, dotée d''un siège permanent au Conseil
        de Régulation Climatique Global.'
      description_complete: 'Depuis la barge Alofa-Fenua, les caméras du Prisme Global
        transmettent en direct le vote historique : onze ministres tuvaluans, costumes
        trempés par les embruns, ratifient la dissolution de leur assise terrestre
        et la naissance d''un État sans sol. Le Conseil de Régulation Climatique Global
        valide le Protocole de Funafuti en moins de soixante-douze heures — une vélocité
        institutionnelle jugée impossible une décennie plus tôt. Leena Väinälä, présente
        à Genève pour la session extraordinaire, qualifie l''acte de « révolution
        juridique silencieuse accomplie par des hommes qui ont perdu leur île mais
        pas leur dignité ». Pour la première fois, un droit post-territorial pleinement
        opérationnel est codifié dans un traité onusien contraignant.'
      consequences: Le Protocole de Funafuti devient le socle du droit international
        post-territorial, redéfinissant la souveraineté comme un attribut de la communauté
        et non du sol — un précédent que vingt-trois États côtiers menacés invoquent
        dans les deux décennies suivantes pour négocier leur propre statut flottant
        ou diasporique. Le Pacific South Resilience Network s'impose comme interlocuteur
        incontournable dans toutes les négociations climatiques globales, transformant
        la catastrophe en levier diplomatique durable et fragilisant les doctrines
        de souveraineté territoriale absolue défendues par plusieurs blocs continentaux.
