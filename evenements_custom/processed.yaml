  - scenario: new_sustainability
    status: injected
    instance_data:
      nom: La Grande Confluence — Exode du Midwest et Pacte des Grands Lacs
      date: 2044
      date_label: été-automne 2044
      evenement_cle: 18 millions de migrants climatiques convergent vers les Grands
        Lacs 2044
      realisation: 'Après trois étés consécutifs où les thermomètres du Midwest dépassent
        55°C, la migration s''enclenche avec une ampleur sans précédent. Dans le monde
        new_sustainability, le Programme Onusien de Mobilité Climatique et le Great
        Lakes Autonomous Compact ont anticipé partiellement ce scénario via les modèles
        de l''AMMC. La réponse institutionnelle est débordée mais non effondrée :
        des couloirs de migration assistés par le réseau ARIA sont déployés en urgence,
        des hubs d''accueil temporaires s''appuient sur les villes régénératives lacustres.
        Le Bureau des Territoires Résiduels, restructuré sous tutelle du Parlement
        des Territoires, gère la crise dans un cadre légal — précaire mais existant.'
      description_complete: 'L''été 2044 restera dans les mémoires comme ''l''été
        de la marche'' : des colonnes de véhicules surchargés, de familles à pied
        et de convois organisés remontent vers le nord depuis des États devenus littéralement
        inhabitables. Chicago, Milwaukee, Toledo, Cleveland voient leur population
        doubler en moins d''un an. Le Great Lakes Autonomous Compact, qui avait négocié
        son autonomie hydrique en 2051 — non, dès 2041 dans les premières discussions
        — se retrouve en première ligne d''une crise humanitaire interne sans équivalent.
        Le réseau ARIA coordonne en temps réel l''allocation des ressources lacustres,
        mais ses paramètres n''avaient pas été calibrés pour un flux de 18 millions
        de personnes en 18 mois.'
      consequences: L'exode consolide paradoxalement la légitimité des institutions
        technocratiques de coordination, qui démontrent leur capacité à éviter l'effondrement
        même sous pression extrême, au prix de tensions durables sur les ressources
        hydriques des Grands Lacs. Le Great Lakes Autonomous Compact émerge comme
        un modèle de gouvernance de crise, mais aussi comme acteur revendicateur d'une
        autonomie renforcée face aux institutions fédérales américaines débordées.
        La réorganisation territoriale du centre-nord de l'Amérique du Nord devient
        un chantier de décennie, restructurant durablement l'organisation des territoires
        résidentiels et productifs.
