        justifier leur fermeture énergétique et sécuritaire, renforçant la logique
        de souveraineté aux dépens de toute architecture internationale — parfaitement
        cohérent avec tension 5/5 et trajectoire de fragmentation.
  - scenario: new_sustainability
    status: injected
    instance_data:
      nom: 'La Crise de Détroit : Frappes contenues et médiation planétaire'
      date: 2026
      date_label: automne 2026
      evenement_cle: frappes Israël-Iran absorbées par la médiation mondiale 2027
      realisation: 'En octobre 2026, Israël lance des frappes ciblées sur plusieurs
        sites nucléaires iraniens. L''Iran riposte sur des terminaux pétroliers du
        Golfe. Mais contrairement aux scénarios d''escalade craints, la communauté
        internationale — encore dotée d''institutions multilatérales fonctionnelles
        bien qu''en tension — mobilise en urgence des mécanismes de désescalade. Le
        choc est réel mais contenu : il devient l''un des catalyseurs qui accélère,
        dans les années suivantes, la refonte des cadres de sécurité collective et
        la transition énergétique hors pétrole du Golfe.'
      description_complete: 'Nairobi, 14 novembre 2026 — Les premières images des
        colonnes de fumée au-dessus de Bandar Abbas circulent en boucle sur les réseaux
        d''information ouverts. Kofi Asante-Mensah, alors jeune correspondant, documente
        en direct la réunion d''urgence du Conseil de Sécurité élargi. Le conflit
        dure onze semaines, fait des milliers de victimes et fait bondir les prix
        du pétrole de 60 %. Mais la mécanique de l''embrasement régional ne s''enclenche
        pas : la Turquie, l''Arabie Saoudite et le Qatar choisissent la neutralité
        active sous pression coordonnée des grandes puissances.'
      consequences: Le choc énergétique de 2026-2027 agit comme un électrochoc pour
        les investissements dans les renouvelables et l'indépendance énergétique régionale,
        contribuant directement à l'accélération de la transition. Sur le plan géopolitique,
        l'événement laisse une cicatrice durable au Moyen-Orient mais nourrit paradoxalement
        les Accords de gouvernance mondiale des années 2030-2040, le monde ayant frôlé
        une catastrophe qu'il a su — de justesse — éviter.
