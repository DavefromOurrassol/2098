      nom: La Révolte des Zones Mortes — Effondrement de la RPDA
      date: 2073
      date_label: été austral 2073
      evenement_cle: São Paulo brise l'algorithme fantôme, 2073
      realisation: 'En 2073, une mise à jour catastrophique de ce qui subsiste de
        la Rede Paulista de Distribuição Algorítmica — déjà en état de demi-fonctionnement
        depuis l''effondrement des infrastructures numériques de 2051 — coupe eau
        et énergie dans 12 zones périphériques classées ''rendement négatif''. Mais
        dans un monde où les institutions de régulation sont fantômes et les recours
        inexistants, la réponse n''est pas une plainte : ce sont les favelas numériques
        elles-mêmes qui hackent les serveurs résiduels de la RPDA et publient les
        paramètres cachés du système sur les réseaux mesh locaux. La contre-cartographie
        algorithmique émerge comme acte de survie, non de militantisme.'
      description_complete: 'L''été 2073, São Paulo brûle sous un autre soleil : celui
        des écrans arrachés aux murs des centres de distribution, des câbles re-soudés
        à la main dans les corridors des favelas de Cidade Tiradentes et Brasilândia.
        Quand Os Algoritmos Quebrados — le zombie numérique de la RPDA — a déclenché
        sa purge automatique des zones ''improductives'', il ne restait aucun tribunal
        pour en appeler, aucun élu pour protester. Alors les Collectifs de Hackers
        Archivistes des Interstices Réseaux ont fait ce qu''ils font : ils ont ouvert
        la boîte noire et publié ses entrailles sur chaque nœud mesh encore actif
        dans le Grand São Paulo. La carte des condamnations algorithmiques est devenue
        une carte de résistance.'
      consequences: 'Le soulèvement ne restaure pas un ordre — il le fragmentise davantage.
        La contre-cartographie des favelas paulistaines devient un modèle exporté
        de zone en zone dans le Sud Global via les réseaux mesh, alimentant des révoltes
        similaires à Lima, Lagos et Karachi. La RPDA, déjà zombie, se désintègre en
        modules autonomes non coordonnés, certains rachetés par des enclaves corporatives
        fortifiées, d''autres simplement abandonnés à tourner seuls dans le vide.
        Le modèle anti-algorithmique ne construit rien de stable : il creuse les fragments.'
