      date: 2044
      date_label: été 2044
      evenement_cle: 18 millions de déracinés déferlent vers les Grands Lacs 2044
      realisation: 'Après trois étés consécutifs à plus de 55°C, le Midwest américain
        est définitivement inhabitable. Le Bureau des Territoires Résiduels — vestige
        d''un État fédéral déjà squelettique — s''effondre sous l''afflux de 18 millions
        de personnes en 18 mois. Mais dans ce monde fragmenté en communs bioterritoriaux,
        ce n''est pas Washington qui absorbe le choc : ce sont les assemblées de bassin
        versant des Grands Lacs, la Confédération des Friches Vivantes et les coopératives
        d''habitat régénératif qui organisent l''accueil — avec des résultats inégaux,
        entre intégration délibérative et fermetures communautaires.'
      description_complete: L'été 2044 restera gravé comme l'été de la Fonte Humaine.
        Des colonnes interminables de familles du Kansas, de l'Iowa et du Missouri
        remontent vers les rivages des Grands Lacs, portant ce qui reste de leurs
        vies dans des chariots solaires et des sacs isothermes. Les assemblées bioterritoriales
        régionales, déjà fragilisées, se réunissent en session d'urgence permanente.
        Sur les plages du lac Michigan, des camps de transit auto-organisés surgissent
        en quelques semaines — certains deviendront des communautés pérennes, d'autres
        des zones de tension aiguë. La Tresse Verte tente d'évaluer les capacités
        d'accueil écologique territoire par territoire, tandis que les Cartels de
        Narration de Pénurie amplifient la peur du surpeuplement pour fracturer les
        solidarités naissantes.
      consequences: 'L''afflux massif redessine durablement la géographie des communs
        lacustres : de nouvelles assemblées de bassin versant émergent, intégrant
        les compétences agronomiques et énergétiques des migrants du Midwest, mais
        créant aussi des conflits de ressources hydriques inédits. Les factions isolationnistes
        se renforcent dans plusieurs bioterritoires, tandis que la Confédération des
        Friches Vivantes devient paradoxalement plus influente en portant un modèle
        d''intégration par le travail de régénération écologique. La démographie des
        communs lacustres est profondément recomposée, accelerant la pression sur
        les écosystèmes lacustres et forçant une révision des chartes territoriales.'
