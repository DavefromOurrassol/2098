    description_complete: Une coalition hétérogène réunissant peuples autochtones,
      scientifiques et autorités locales pour exercer une souveraineté collective
      sur un territoire écologique d'importance planétaire. Elle incarne la tentative
      de transformer un patrimoine naturel exceptionnel en levier politique légitime,
      en faisant valoir que ceux qui habitent et gardent l'écosystème sont les plus
      aptes à le gouverner. En négociant directement avec les grandes puissances,
      elle revendique une forme de diplomatie écologique infra-étatique, court-circuitant
      les États-nations traditionnels au nom de la vie elle-même.
    tension_fondamentale: La souveraineté écologique portée par les gardiens du territoire
      contre la convoitise des blocs extérieurs qui voient dans l'écosystème une ressource
