  archetype:
    description_complete: 'Une administration bureaucratique chargée de gérer l''effacement
      officiel de territoires et de populations jugés non viables par le pouvoir central
      : elle recense, classe, archive ce que l''État abandonne plutôt que de le gouverner.
      Fantôme institutionnel survivant à sa propre obsolescence, elle accumule une
      connaissance exhaustive des marges sans jamais la restituer à ceux qu''elle
      concerne. Sa fonction réelle n''est pas la gestion des zones résiduelles mais
      la production d''un savoir stratégique sur l''abandon — un inventaire du sacrifice
      que l''État fait de ses propres citoyens. Elle devient ainsi, malgré elle ou
      à son insu, un arsenal potentiel pour quiconque voudrait prouver ce que le pouvoir
      préfère taire.'
    tension_fondamentale: 'L''institution qui documente l''abandon est la seule à
      détenir la preuve de cet abandon : garder ces archives au secret est l''acte
      fondateur de sa complicité avec le pouvoir, mais les laisser fuir est l''acte
      qui donne une arme à ceux que ce pouvoir a sacrifiés.'
