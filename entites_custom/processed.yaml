  archetype:
    description_complete: 'Une confédération de territoires partageant une ressource
      vitale commune — eau, air, sol, énergie — qui, face à la défaillance ou à l''inadéquation
      des États-nations et des institutions globales, forge une gouvernance hybride
      inédite, associant entités étatiques résiduelles, communautés autochtones et
      pouvoirs locaux. Elle incarne le modèle du compact territorial post-national
      : une forme d''autorité légitime qui naît non d''une souveraineté héritée mais
      d''une nécessité écologique partagée, et qui devient référence mondiale précisément
      parce qu''elle a dû inventer ce que les cadres existants ne pouvaient plus fournir.
      Sa légitimité est fonctionnelle avant d''être symbolique.'
    tension_fondamentale: L'autonomie régionale sur une ressource commune est-elle
      un acte de responsabilité collective ou une sécession déguisée qui prive d'autres
      acteurs — nations, populations extérieures, générations futures — d'un accès
      équitable à ce bien vital ? Le modèle qui se veut universel peut-il rester souverain
      sans devenir exclusif ?
    variables_potentielles:
