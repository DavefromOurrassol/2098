  archetype:
    description_complete: 'La Zone Grise Tampon est l''espace de transition institutionnalisée
      que tout ordre séparatiste crée entre son cœur sécurisé et le chaos qu''il produit
      en s''en protégeant. Contrairement aux zones grises globales — diffuses et spontanées
      — elle est délibérément intercalée, architecturée comme sas de tri : elle trie
      les corps, filtre les flux, sous-traite les fonctions que le centre exige sans
      vouloir les assumer. Elle n''est pas le résidu d''un effondrement mais l''instrument
      conscient d''un ordre qui a besoin de marges pour fonctionner, peuplant ces
      franges de populations en attente, de milices privées et d''intermédiaires dont
      l''existence même codifie l''inégalité entre l''intérieur et l''extérieur.'
    tension_fondamentale: La zone tampon tire son utilité systémique de sa nature
