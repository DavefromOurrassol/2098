  archetype:
    description_complete: 'L''interstice territorial est l''espace que l''ordre produit
      malgré lui en se structurant : toute délimitation crée un dehors, toute intégration
      génère un résidu. Ces zones ne préexistent pas à la fragmentation — elles en
