  archetype:
    description_complete: Un système d'allocation algorithmique des ressources vitales
      à l'échelle métropolitaine — eau, énergie, logement, mobilité — géré par une
      intelligence artificielle dont les paramètres de décision concentrent un pouvoir
      immense sur la vie quotidienne de millions d'habitants. Né d'une promesse d'optimisation
      rationnelle et équitable, il devient au fil du temps un dispositif de gouvernance
      opaque, dont les biais techniques cristallisent des inégalités structurelles.
      Symbole de la modernité technocratique dans les mégalopoles du Sud global, il
      est simultanément modèle exporté et terrain de contestation radicale. Il incarne
      la tension entre l'efficacité mesurable des machines et la légitimité politique
      des choix qu'elles encodent sans le dire.
    tension_fondamentale: L'optimisation algorithmique des communs urbains promet
      l'équité par le calcul, mais encode silencieusement des hiérarchies politiques
      dans ses paramètres — la neutralité technique est une fiction qui redistribue
      le pouvoir sans délibération.
