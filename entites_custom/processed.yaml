  archetype:
    description_complete: Un réseau de communautés périphériques et marginalisées
      qui transforment leur vulnérabilité structurelle en force collective, s'organisant
      autour de ressources locales partagées — énergie, eau, terre, semences — pour
      bâtir une économie de la subsistance émancipée. Enraciné dans des territoires
      que les centres de pouvoir ont abandonnés ou pillés, ce type d'entité articule
      résistance active et construction patiente d'alternatives concrètes, refusant
      à la fois la dépendance aux structures globales et la logique de l'accumulation.
      Il incarne la possibilité que la marge devienne laboratoire, que le dénuement
      engendre l'invention, et que la solidarité horizontale entre pairs constitue
      une forme de gouvernance à part entière.
    tension_fondamentale: 'La survie par l''autonomie radicale contre la tentation
      de l''intégration aux circuits dominants : ce réseau doit sans cesse arbitrer
      entre l''imperméabilité qui protège et l''ouverture qui renforce, entre la pureté
      de la rupture avec les pouvoirs établis et les compromis nécessaires à son expansion
      et à sa durabilité.'
