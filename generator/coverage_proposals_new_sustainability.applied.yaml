scenario: new_sustainability
instructions: 'Vérifiez chaque affectation. Mettez ''valide: false'' pour rejeter
  une proposition. Pour action: absorber, vérifiez que zone_slug est cohérente. Pour
  action: nouvelle_zone, vérifiez les champs de la zone. Lancez ensuite : python3
  complete_geographie_coverage.py --scenario new_sustainability --apply'
affectations:
- pays: Pologne
  action: absorber
  zone_slug: bloc_eurasien_souverainiste
  justification: La Pologne, géographiquement et politiquement proche des pays d'Europe
    centrale déjà inclus, s'aligne sur la résistance aux modèles écologiques imposés
    par les centres institutionnels.
  valide: true
- pays: Afrique du Sud
  action: absorber
  zone_slug: afrique_continentale
  justification: L'Afrique du Sud fait partie intégrante de l'Union Panafricaine et
    de ses structures de gouvernance continentale, notamment pour la gestion de l'eau.
  valide: true
- pays: Éthiopie
  action: absorber
  zone_slug: afrique_continentale
  justification: L'Éthiopie, située en Afrique de l'Est, est incluse dans l'Union
    Panafricaine et ses initiatives de bassins versants.
  valide: true
- pays: Arctique
  action: absorber
  zone_slug: arctic_passage_qaanaaq
  justification: L'Arctique, en tant que région géopolitique, est déjà couvert par
    le Nuna Siku Governance Council et son siège à Qaanaaq.
  valide: true
