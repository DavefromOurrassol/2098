scenario: eco_communalism
instructions: 'Vérifiez chaque affectation. Mettez ''valide: false'' pour rejeter
  une proposition. Pour action: absorber, vérifiez que zone_slug est cohérente. Pour
  action: nouvelle_zone, vérifiez les champs de la zone. Lancez ensuite : python3
  complete_geographie_coverage.py --scenario eco_communalism --apply'
affectations:
- pays: Égypte
  action: absorber
  zone_slug: maghreb_mediterraneen
  justification: L'Égypte, bordée par la Méditerranée, s'intègre naturellement dans
    le réseau des bassins versants méditerranéens du Maghreb Méditerranéen, axé sur
    la gestion collective des ressources hydriques.
  valide: true
- pays: Guinée
  action: absorber
  zone_slug: sahel_numerique_ligue
  justification: La Guinée, bien que partiellement forestière, partage des dynamiques
    sahéliennes et peut s'intégrer à la Ligue des Cités du Sahel Numérique, notamment
    via ses zones nord.
  valide: true
- pays: Sierra Leone
  action: absorber
  zone_slug: chiapas_et_bioterritoires_mesoamericains
  justification: La Sierra Leone, avec ses communautés côtières et forestières, peut
    rejoindre les Bioterritoires Mésoaméricains, qui couvrent déjà des zones caribéennes
    et africaines via des réseaux éco-communalistes transrégionaux.
  valide: true
- pays: Liberia
  action: absorber
  zone_slug: chiapas_et_bioterritoires_mesoamericains
  justification: Le Liberia, comme la Sierra Leone, partage des écosystèmes forestiers
    et côtiers compatibles avec les Bioterritoires Mésoaméricains, qui incluent déjà
    des zones africaines via des liens historiques et écologiques.
  valide: true
- pays: Côte d'Ivoire
  action: absorber
  zone_slug: sahel_numerique_ligue
  justification: La Côte d'Ivoire, avec ses zones nord sahéliennes et son intégration
    économique régionale, peut être absorbée par la Ligue des Cités du Sahel Numérique,
    qui couvre déjà des pays voisins comme le Ghana et le Burkina Faso.
  valide: true
