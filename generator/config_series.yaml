# ─────────────────────────────────────────
# CONFIGURATION SÉRIE D'ARTICLES
# Ourrassol 2098
# ─────────────────────────────────────────

# ── Scénario monde ──
# Un seul scénario par série
# Valeurs : fortress_world | new_sustainability | breakdown
#           eco_communalism | policy_reform | reference
scenario: policy_reform

# ── Ligne éditoriale ──
# Détermine le journal et sa posture éditoriale pour toute la série.
# Valeurs possibles :
#   pro_pouvoir  = journal aligné avec le pouvoir dominant du scénario
#   opposition   = journal critique ou clandestin
#   ~            = laisser vide (null) pour un tirage aléatoire à chaque article
# Si absent : tirage aléatoire
ligne_editoriale: 

# ── Thématiques à couvrir ──
# Liste des rubriques pour cette série.
# Chaque thématique génère articles_par_thematique articles.
thematiques:
  - politique
  - societe
# ── Nombre d'articles par thématique ──
# 1 = un article par thématique (recommandé pour commencer)
articles_par_thematique: 1

# ── Longueur des articles ──
# breve | analyse | reportage | chronique | editorial
# "auto" = laisse chaque thématique choisir son format naturel
longueur: breve

# ── Angle spécifique (optionnel) ──
# Précise un angle commun à tous les articles de la série.
# Laisser vide pour laisser Claude choisir librement.
# Exemple : "focus sur les conséquences pour les populations locales"
angle_specifique: 

# ── Injections d'entités custom ──
# Entités custom à activer pour tous les articles de cette série.
# Laisser vide pour utiliser uniquement les entités canoniques.
#
# Exemple :
# injections:
#   - instance: mon_entite_custom_breakdown
#     actif: true
injections: []

# ── Sortie ──
# Les articles sont sauvegardés dans :
# vault/articles/{scenario}/
# Un fichier _index.md est généré automatiquement.
