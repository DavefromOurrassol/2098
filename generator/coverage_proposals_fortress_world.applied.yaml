scenario: fortress_world
instructions: 'Vérifiez chaque affectation. Mettez ''valide: false'' pour rejeter
  une proposition. Pour action: absorber, vérifiez que zone_slug est cohérente. Pour
  action: nouvelle_zone, vérifiez les champs de la zone. Lancez ensuite : python3
  complete_geographie_coverage.py --scenario fortress_world --apply'
affectations:
- pays: Angleterre
  action: absorber
  zone_slug: bloc_atlantique
  justification: L'Angleterre fait partie du Royaume-Uni, déjà intégré au Bloc Atlantique,
    zone dominante centrée sur l'espace atlantique nord.
  valide: true
- pays: Écosse
  action: absorber
  zone_slug: bloc_atlantique
  justification: L'Écosse, bien que distincte politiquement, reste géographiquement
    et stratégiquement liée au Royaume-Uni dans le Bloc Atlantique.
  valide: true
- pays: Pays de Galles
  action: absorber
  zone_slug: bloc_atlantique
  justification: Le Pays de Galles, comme l'Angleterre et l'Écosse, est intégré au
    Bloc Atlantique via le Royaume-Uni.
  valide: true
- pays: Italie
  action: absorber
  zone_slug: bloc_atlantique
  justification: L'Italie, membre historique de l'OTAN et de l'UE, est absorbée par
    le Bloc Atlantique, qui couvre l'Europe de l'Ouest.
  valide: true
- pays: Grèce
  action: absorber
  zone_slug: zones_grises_tampons
  justification: La Grèce, située en périphérie des blocs dominants et en tension
    avec la Turquie, est classée comme zone tampon.
  valide: true
- pays: Fidji
  action: absorber
  zone_slug: archipel_indonesien_forteresses_maritimes
  justification: Fidji, archipel du Pacifique, s'intègre naturellement dans la fragmentation
    maritime de l'archipel indonésien.
  valide: true
- pays: Vanuatu
  action: absorber
  zone_slug: archipel_indonesien_forteresses_maritimes
  justification: Vanuatu, comme Fidji, est absorbé par la dynamique des forteresses
    maritimes du Pacifique.
  valide: true
- pays: Îles Salomon
  action: absorber
  zone_slug: archipel_indonesien_forteresses_maritimes
  justification: Les Îles Salomon, géographiquement proches, rejoignent les forteresses
    maritimes du Pacifique.
  valide: true
