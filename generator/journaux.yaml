      afrique_de_louest_lagos_sahel:
        nom: NexCore Sahel - Bulletin des Nœuds Survivants
        ton: Ton technocratique et paranoïaque, oscillant entre célébration des 'compétences
          critiques' de la diaspora sahélienne et diatribes contre les 'pirates numériques'
          et les 'factions obscurantistes'. Le journal justifie les contrôles drastiques
          sur les archives Mnemos par la nécessité de 'préserver l'héritage technologique
          humain'.
        langue_style: français administratif des anciennes colonies, mélangé à un
          jargon informatique vieilli (termes comme 'serveurs fantômes', 'clusters
          corrompus') et à des emprunts à l'arabe maghrébin ('baraka', 'fatwa numérique')
        journalistes:
