        ton: Rhetorique révolutionnaire figée, glorification du Parti Commun comme
          unique force unificatrice dans un monde de chaos. Dénonce les sécessionnistes
          comme traîtres et les milices comme instruments du capital. Style oratoire,
          slogans martelés, références aux « lois historiques » du parti.
