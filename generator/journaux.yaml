      arc_sahelo_mediterraneen:
        nom: Seuil Sécurisé - Bulletin des Racines-Mères
        ton: Ton apocalyptique et messianique, présentant l'Arc Sahélo-Méditerranéen
          comme un 'laboratoire de survie'. Le journal alterne entre appels à la 'résilience
          collective' et justifications violentes des 'nettoyages préventifs' contre
          les 'saboteurs'. Le style est pamphlétaire, avec des références aux 'anciens
          accords oubliés' comme fondement du nouvel ordre.
        langue_style: occitan modernisé (mélange de gascon, languedocien et catalan)
          avec des termes arabes ('baraka', 'jihad économique') et des emprunts au
          français technique ('zones tampons', 'fragments Terrafond'), phrases longues
